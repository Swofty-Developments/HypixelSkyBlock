apiVersion: apps/v1
kind: Deployment
metadata:
  name: prototype-lobby
  namespace: hypixel-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prototype-lobby
  template:
    metadata:
      labels:
        app: prototype-lobby
    spec:
      containers:
        - name: game-server
          image: hypixel-local/game-server:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: hypixel-config
            - secretRef:
                name: hypixel-secrets
          env:
            - name: HYPIXEL_ADVERTISED_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_CMD
              value: java $JAVA_OPTS -jar HypixelCore.jar PROTOTYPE_LOBBY
          ports:
            - name: minecraft
              containerPort: 25565
            - name: management
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
            initialDelaySeconds: 35
            periodSeconds: 10
