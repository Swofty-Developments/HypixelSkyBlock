apiVersion: v1
kind: Namespace
metadata:
  name: hypixel-local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hypixel-config
  namespace: hypixel-local
data:
  HYPIXEL_HOST_NAME: "0.0.0.0"
  HYPIXEL_ADVERTISED_PORT: "25565"
  HYPIXEL_MANAGEMENT_ENABLED: "true"
  HYPIXEL_MANAGEMENT_HOST_NAME: "0.0.0.0"
  HYPIXEL_MANAGEMENT_PORT: "9090"
---
apiVersion: v1
kind: Secret
metadata:
  name: hypixel-secrets
  namespace: hypixel-local
type: Opaque
stringData:
  HYPIXEL_MONGODB: "mongodb://mongodb.hypixel-local.svc.cluster.local:27017/Minestom?directConnection=true"
  HYPIXEL_REDIS_URI: "redis://redis.hypixel-local.svc.cluster.local:6379"
  HYPIXEL_VELOCITY_SECRET: "change-me-local"
  FORWARDING_SECRET: "change-me-local"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: hypixel-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongo
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: hypixel-local
spec:
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hypixel-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hypixel-local
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypixel-proxy
  namespace: hypixel-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hypixel-proxy
  template:
    metadata:
      labels:
        app: hypixel-proxy
    spec:
      containers:
        - name: proxy
          image: hypixel-local/proxy:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: hypixel-config
            - secretRef:
                name: hypixel-secrets
          ports:
            - name: minecraft
              containerPort: 25565
            - name: management
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hypixel-proxy
  namespace: hypixel-local
spec:
  type: LoadBalancer
  selector:
    app: hypixel-proxy
  ports:
    - name: minecraft
      port: 25565
      targetPort: minecraft
    - name: management
      port: 9090
      targetPort: management
---
