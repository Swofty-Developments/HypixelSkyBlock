apiVersion: apps/v1
kind: Deployment
metadata:
  name: prototype-lobby
  namespace: hypixel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prototype-lobby
      hypixel/server-type: PROTOTYPE_LOBBY
  template:
    metadata:
      labels:
        app: prototype-lobby
        hypixel/server-type: PROTOTYPE_LOBBY
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: prototype-lobby
      containers:
        - name: game-server
          image: hypixel-game:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: hypixel-config
            - secretRef:
                name: hypixel-secrets
          env:
            - name: HYPIXEL_ADVERTISED_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_CMD
              value: java $JAVA_OPTS -jar HypixelCore.jar PROTOTYPE_LOBBY
          ports:
            - name: minecraft
              containerPort: 25565
            - name: management
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
