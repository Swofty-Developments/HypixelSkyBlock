spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-orchestrator
  template:
    metadata:
      labels:
        app: service-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: service
          image: hypixel-service-orchestrator:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: hypixel-config
            - secretRef:
                name: hypixel-secrets
          ports:
            - name: management
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
