apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-auctionhouse
  namespace: hypixel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-auctionhouse
  template:
    metadata:
      labels:
        app: service-auctionhouse
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: service
          image: hypixel-service-auctionhouse:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: hypixel-config
            - secretRef:
                name: hypixel-secrets
          ports:
            - name: management
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
---
apiVersion: apps/v1
kind: Deployment
