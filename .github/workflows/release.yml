name: Add to GitHub Releases

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

# Only one release run may publish at a time. The release action deletes and
# recreates the "latest" tag/release on every push, so concurrent runs race and
# fail mid-upload with "Not Found". Queue runs and let the newest commit win.
concurrency:
  group: add-to-github-releases
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5.1.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: setup/go.mod
          check-latest: true

      - name: Grant Gradlew Permissions
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew shadowJar

      - name: Test setup TUI
        run: go test ./...
        working-directory: setup

      - name: Build setup TUI release assets
        working-directory: setup
        run: |
          mkdir -p dist
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              name="skyblock-installer_${goos}_${goarch}"
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
                go build -trimpath -ldflags="-s -w" -o "dist/skyblock-installer" ./cmd/skyblock-installer
              tar -C dist -czf "dist/${name}.tar.gz" skyblock-installer
              rm dist/skyblock-installer
            done
          done

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Add Jar to GitHub releases
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "Automatic Build"
          files: |
            velocity.extension/build/libs/*.jar
            proxy.api/build/libs/*.jar
            loader/build/libs/*.jar
            commons/build/libs/*.jar
            packer/build/libs/*.jar
            service.auctionhouse/build/libs/*.jar
            service.bazaar/build/libs/*.jar
            service.itemtracker/build/libs/*.jar
            service.api/build/libs/*.jar
            service.datamutex/build/libs/*.jar
            service.party/build/libs/*.jar
            service.orchestrator/build/libs/*.jar
            service.friend/build/libs/*.jar
            service.darkauction/build/libs/*.jar
            setup/dist/*.tar.gz
