name: Add to GitHub Releases

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant Gradlew Permissions
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew shadowJar

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: setup/go.mod

      - name: Run Go tests
        working-directory: setup
        run: go test ./...

      - name: Build setup CLI archives
        working-directory: setup
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/hypixel-setup-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/hypixel-setup-linux-arm64 .
          tar -C dist -czf dist/hypixel-setup-linux-amd64.tar.gz hypixel-setup-linux-amd64 --transform 's/hypixel-setup-linux-amd64/hypixel-setup/'
          tar -C dist -czf dist/hypixel-setup-linux-arm64.tar.gz hypixel-setup-linux-arm64 --transform 's/hypixel-setup-linux-arm64/hypixel-setup/'

      - name: Add Jar to GitHub releases
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "Automatic Build"
          files: |
            velocity.extension/build/libs/*.jar
            proxy.api/build/libs/*.jar
            loader/build/libs/*.jar
            commons/build/libs/*.jar
            packer/build/libs/*.jar
            service.auctionhouse/build/libs/*.jar
            service.bazaar/build/libs/*.jar
            service.itemtracker/build/libs/*.jar
            service.api/build/libs/*.jar
            service.datamutex/build/libs/*.jar
            service.party/build/libs/*.jar
            service.orchestrator/build/libs/*.jar
            service.friend/build/libs/*.jar
            service.darkauction/build/libs/*.jar
            setup/dist/hypixel-setup-linux-amd64.tar.gz
            setup/dist/hypixel-setup-linux-arm64.tar.gz

  publish-core-images:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set registry owner
        id: registry
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DockerFiles/Dockerfile.proxy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/hypixel-proxy:latest
            ghcr.io/${{ steps.registry.outputs.owner }}/hypixel-proxy:${{ github.sha }}

      - name: Build and push shared game image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DockerFiles/Dockerfile.game_server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/hypixel-game:latest
            ghcr.io/${{ steps.registry.outputs.owner }}/hypixel-game:${{ github.sha }}

  publish-service-images:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - image: hypixel-service-api
            module: service.api
            jar: ServiceAPI.jar
          - image: hypixel-service-auctionhouse
            module: service.auctionhouse
            jar: ServiceAuctionHouse.jar
          - image: hypixel-service-bazaar
            module: service.bazaar
            jar: ServiceBazaar.jar
          - image: hypixel-service-darkauction
            module: service.darkauction
            jar: ServiceDarkAuction.jar
          - image: hypixel-service-datamutex
            module: service.datamutex
            jar: ServiceDataMutex.jar
          - image: hypixel-service-friend
            module: service.friend
            jar: ServiceFriend.jar
          - image: hypixel-service-itemtracker
            module: service.itemtracker
            jar: ServiceItemTracker.jar
          - image: hypixel-service-orchestrator
            module: service.orchestrator
            jar: ServiceOrchestrator.jar
          - image: hypixel-service-party
            module: service.party
            jar: ServiceParty.jar
          - image: hypixel-service-punishment
            module: service.punishment
            jar: ServicePunishment.jar

    steps:
      - uses: actions/checkout@v6
      - name: Set registry owner
        id: registry
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: DockerFiles/Dockerfile.service
          build-args: |
            SERVICE_MODULE=${{ matrix.module }}
            SERVICE_JAR=${{ matrix.jar }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
