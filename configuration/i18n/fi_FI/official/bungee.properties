bungee_miscellaneous.9="<yellow>Hypixel Network\n\n<red>Yhteyden muodostamisessa palvelimeen tapahtui virhe! :(\nYritä yhteyden muodostamista uudelleen. Jos ongelma jatkuu,\nota yhteyttä henkilökuntaan ja anna alla näkyvät tiedot!\n\n%%debug%%"
bungee_miscellaneous.10="<red>Tätä komentoa suoritettaessa tapahtui virhe. Ole hyvä ja ilmoita tästä henkilökunnalle!"
