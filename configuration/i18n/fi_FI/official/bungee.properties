bungee_miscellaneous.12="<red>Et ole kirjautunut Hypixeliin aikaisemmin, ja me olemme offline-tilassa!"
bungee_miscellaneous.13="<red>Käyttäjänimesi on epäasiallinen. Vaihda nimesi osoitteessa minecraft.net ennen kuin yrität uudelleen.\nJos tämä on virhe, vieraile osoitteessa https://hypixel.net"
bungee_miscellaneous.14="<gold>Tämä palvelin on täynnä, ja VIP-etuoikeus on poissa päältä! Yritä myöhemmin uudelleen!"
