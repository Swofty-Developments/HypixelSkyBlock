bungee_miscellaneous.16="<gold>Tämä palvelin on täynnä! Osta <green>VIP <gold>osoitteessa http://store.hypixel.net voidaksesi liittyä."
bungee_miscellaneous.17="<red>Höh, emme löydä tuota palvelinta listaltamme! Todennäköisesti vika on meidän pääsäämme. Ota yhteyttä henkilökuntaan."
