daily_rewards.74="Huomasimme sinun käyttävän mainostenesto-ohjelmaa. Lunastaaksesi palkinnon sinun tulee asettaa mainostenesto-ohjelma pois päältä tällä sivulla."
daily_rewards.75="<h1>KUINKA SE TOIMII</h1>\n\nJoka kerta lunastaessasi palkintoa, pakasta vedetään 3 satunnaista korttia. Näissä korteissa olevat palkinnot sisältävät minipelien kolikoita, Hypixel-experienceä, Mystery Box -esineitä ja paljon muuta. Voit klikata yhtä näistä korteista lunastaaksesi siinä olevan palkinnon pelissä. Kun viet hiiren kortin päälle, saat lisätietoa palkinnosta.\n\nPalkintokortit voivat olla harvinaisuustasoltaan Yleisiä, Harvinaisia, Eeppisiä tai Legendaarisia. Yleinen esine on kaikkein arvottomin, ja Legendaarinen taas arvokkain ja vaikein löytää.\n\nTavallisesti voit lunastaa vain yhden palkinnon päivässä - ajastin nollautuu joka päivä keskiyöllä EST (04:00 UTC).\n\n<h1>PALKINTOMERKIT</h1>\n\nVoit käyttää Palkintomerkkejä lunastaaksesi enemmän palkintoja - yksi käytetty merkki Lähettimiehen luona sallii sinun lunastaa yhden palkinnon. Palkintomerkkejä taas voi löytää palkintokorteista, ja uusia tapoja löytää niitä saatetaan lisätä myöhemmin.\n\n<h1>PÄIVITTÄINEN PUTKI</h1>\n\nPalkintojärjestelmään kuuluu myös laskuri, joka laskee kuinka monena päivänä peräkkäin olet lunastanut palkintoja. Joka päivä kun lunastat palkinnon, kasvatat lukua, joka näkyy palkintosivulla netissä. Joka yhdeksäs päivä, kerättyäsi palkintoja päivittäin, saat yhden ilmaisen Palkintomerkin, jolla voit lunastaa yhden ylimääräisen palkinnon!\n\n<h1>JAA SOSIAALISESSA MEDIASSA</h1>\n\nKun olet lunastanut palkinnon, voit jakaa sen Twitterissä tai Facebookissa klikkaamalla kuvakkeita. Voit myös ladata kortin kuvan itsellesi voidaksesi siirtää sen muille nettisivuille tai vaikkapa tänne foorumeille!"