# Ike
npcs_spidersden.ike.dialogue.initial_hello.1=You heard what Michael said about Mob Types?
npcs_spidersden.ike.dialogue.answering_no.1=Then go talk to him, bro.
npcs_spidersden.ike.dialogue.continuation_1.1=Not to flex, but I've seen enough films to know about every mob type in existence.
npcs_spidersden.ike.dialogue.continuation_1.2=I'm bored, so let's play a game, just us two.
npcs_spidersden.ike.dialogue.continuation_2.1=You go out and slay some mobs and, every time you kill a mob with a new mob type, I'll add it to my book!
npcs_spidersden.ike.dialogue.continuation_2.2=I'll give you a reward each time you kill a new mob type, so get busy!
npcs_spidersden.ike.dialogue.continuation_2.3=Talk to me again if you want to check your progress!
npcs_spidersden.ike.dialogue.idle_1.1='Sup champ! How's that Mob Type collection coming along? Let's take a look!
npcs_spidersden.ike.dialogue.idle_2.1=Dude, I'm so bored out here. Mind showing me what you've been up to?
npcs_spidersden.ike.dialogue.close.1=Get back out there, there's always more to explore!

# Bramass Beastslayer
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.1=Hello, adventurer! I am <red>Bramass Beastslayer<white>! I've slain beasts of all sorts across SkyBlock!
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.2=I sure wish there was a record of all of my accomplishments in one place!
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.3=Oh wait...there is!
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.4=Your <dark_aqua>Bestiary<white> is a compendium of all of the mobs in SkyBlock!
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.5=View your mob stats, unlock rewards, and more!
npcs_spidersden.bramass_beastslayer.dialogue.initial_hello.6=You can find the Bestiary in your <green>Combat Skill<white> menu!
npcs_spidersden.bramass_beastslayer.dialogue.idle_1.1=Killing mobs in a Family enough times rewards you with <aqua>✯ Magic Find<white> towards that mob!
npcs_spidersden.bramass_beastslayer.dialogue.idle_2.1=This increases your chance to find rare loot when killing this mob!
npcs_spidersden.bramass_beastslayer.dialogue.idle_3.1=Killing enough mobs in a given <green>Family<white> unlocks <green>rewards<white>.
npcs_spidersden.bramass_beastslayer.dialogue.idle_4.1=You can unlock <aqua>✯ Magic Find<white>, <red>❁ Strength<white> bonuses, and loot drop information for that Family!
npcs_spidersden.bramass_beastslayer.dialogue.idle_5.1=You can always view your Bestiary in your <green>Combat Skill<white> menu!
npcs_spidersden.bramass_beastslayer.dialogue.idle_6.1=Reach <green>Milestones<white> in your Bestiary by unlocking unique Family tiers.
npcs_spidersden.bramass_beastslayer.dialogue.idle_7.1=Reaching Milestones rewards <red>❤ Health<white>, <dark_aqua>Combat Exp<white>, and more!

# Michael
npcs_spidersden.michael.dialogue.talk_to_ike_before_michael.1=Hey, come talk to me first!
npcs_spidersden.michael.dialogue.initial_hello.1=Wassup! We're out here on a camping trip!
npcs_spidersden.michael.dialogue.initial_hello.2=I don't really know why we chose the <gray>⏣ <red>Spider's Den<white>, though...
npcs_spidersden.michael.dialogue.initial_hello.3=Still, I've been playing lots of games to pass the time.
npcs_spidersden.michael.dialogue.initial_hello.4=Quick! Trivia question! Do you know what <red>Mob Types<white> are?
npcs_spidersden.michael.dialogue.selected_know_mob_types.1=Cool, cool...
npcs_spidersden.michael.dialogue.selected_know_mob_types.2=Well, I'm going to explain it anyways, otherwise my very existence lacks purpose!
npcs_spidersden.michael.dialogue.selected_dont_know_mob_types.1=No problem! Allow me to explain.
npcs_spidersden.michael.dialogue.explaining_mob_types.1=So. <red>Mob Types<white>.
npcs_spidersden.michael.dialogue.explaining_mob_types.2=Every Mob has at least <green>one<white> type, which you can see next to its name.
npcs_spidersden.michael.dialogue.explaining_mob_types.3=For example,  Spiders are classified as <dark_red>Arthropods<white>, which you can tell because of the symbol next to their name.
npcs_spidersden.michael.dialogue.explaining_mob_types.4=Most mobs have <green>one<white> type, but some have <red>more<white>.
npcs_spidersden.michael.dialogue.explaining_mob_types.5=My mate <blue>Ike<white> knows which types all the different symbols represent.
npcs_spidersden.michael.dialogue.explaining_mob_types.6=Go talk to him if you want to learn more!

# Rick
npcs_spidersden.rick.dialogue.initial_hello.1=Hey, I could use some help! My <blue>Promising Shovel<white> just broke, and I don't have the right ingredients to make a new one.
npcs_spidersden.rick.dialogue.initial_hello.2=If you could get me a couple iron ingots, I could make one for us both!
npcs_spidersden.rick.dialogue.still_need_iron.1=Bring me a couple iron ingots and I'll craft us both a Promising Shovel!
npcs_spidersden.rick.dialogue.got_iron.1=Thanks a lot. Here's your Promising Shovel.
npcs_spidersden.rick.dialogue.idle_1.1=Have you met Pat? He's my brother. We're the Flint Bros!
npcs_spidersden.rick.dialogue.idle_2.1=Careful when it rains around here, it gets dangerous!
npcs_spidersden.rick.dialogue.idle_3.1=Mining gravel is hard work, but the flint is worth it.
