# Rusty (Abiphone)
npcs_abiphone.rusty.dialogue.abiphone.1=<white>Did I find an Abiphone?
npcs_abiphone.rusty.dialogue.abiphone.2=<white>Yes, sometimes I do find one lying around.
npcs_abiphone.rusty.dialogue.abiphone.3=<white>What?
npcs_abiphone.rusty.dialogue.abiphone.4=<white>You?
npcs_abiphone.rusty.dialogue.abiphone.5=<white>You want my contact?
npcs_abiphone.rusty.dialogue.abiphone.6=<white>Me?
npcs_abiphone.rusty.dialogue.abiphone.7=<white>The janitor?
npcs_abiphone.rusty.dialogue.abiphone.8=<white>I...
npcs_abiphone.rusty.dialogue.abiphone.9=<white>I don't... don't know what to say...
npcs_abiphone.rusty.dialogue.abiphone.10=<white>Yes of course you can have it!

# Walter (Abiphone)
npcs_abiphone.walter.dialogue.abiphone.1=My abiphone is for Platinum-level donors of the Walter cause only.
npcs_abiphone.walter.dialogue.abiphone.2=You know these superbooms don't craft themselves right?
npcs_abiphone.walter.dialogue.abiphone.3=You just need <dark_aqua>Sulphur Collection 7 <white>and to then donate an Enchanted Sulphur Cube!
npcs_abiphone.walter.dialogue.donate_cube.1=Welcome to the Platinum club, high roller!
npcs_abiphone.walter.dialogue.donate_cube.2=Call me anytime!
npcs_abiphone.walter.dialogue.donate_cube.3=And before you ask... yes, I do try to commercialize all of my friendships.
npcs_abiphone.walter.dialogue.donate_cube_no_requirements.1=Mmh... you're missing something to become a Platinum-level donor...

# Builder (Abiphone)
npcs_abiphone.builder.dialogue.abiphone.1=Oh?
npcs_abiphone.builder.dialogue.abiphone.2=Yes... I could give you my contact... However, may I ask a favor in return?
npcs_abiphone.builder.dialogue.abiphone.3=For a builder to not have a <gold>Builder's Wand <white>is quite uncommon.
npcs_abiphone.builder.dialogue.abiphone.4=If you give me one I'll gladly give you my contact!
npcs_abiphone.builder.dialogue.donate.1=A <gold>Builder's Wand<white>! This is a dream come true!
npcs_abiphone.builder.dialogue.donate_no_requirements.1=You don't have what I need! Nice try!
