# Lazy Miner
npcs_goldmine.lazy_miner.dialogue.first_interaction.1=Whoops! I lost my good pickaxe again in the mines! That's why I always come prepared with a backup!
npcs_goldmine.lazy_miner.dialogue.first_interaction.2=It's probably down in the mine somewhere. Can you go find it?
npcs_goldmine.lazy_miner.dialogue.no_pickaxe_found.1=Find my pickaxe in the Gold Mines! I'm not going back down there...
npcs_goldmine.lazy_miner.dialogue.found_pick_intro.1=Oh! You already found my pickaxe! That's amazing!
npcs_goldmine.lazy_miner.dialogue.found_pick_intro.2=Keep it, it has a special enchantment. Come talk to me when you're ready!
npcs_goldmine.lazy_miner.dialogue.quest_complete.1=You found it! Thank you so much!
npcs_goldmine.lazy_miner.dialogue.quest_complete.2=Keep it as a reward. That pickaxe has Smelting Touch - it automatically smelts ores into ingots!
npcs_goldmine.lazy_miner.dialogue.quest_complete.3=It'll be very useful for collecting iron and gold.
npcs_goldmine.lazy_miner.dialogue.not_reached_deep_caverns.1=The Deep Caverns are full of strange creatures and expensive treasures.
npcs_goldmine.lazy_miner.dialogue.not_reached_deep_caverns.2=Reach Mining Level V to gain access!
npcs_goldmine.lazy_miner.dialogue.not_reached_deep_caverns.3=Have you spelunked the Deep Caverns?
npcs_goldmine.lazy_miner.dialogue.not_reached_deep_caverns.4=They are full of bountiful treasures, but watch out for those Lapis Zombies!
npcs_goldmine.lazy_miner.dialogue.idle.1={month_name} {day} is my resting day!
npcs_goldmine.lazy_miner.dialogue.idle.2=I'd go mining but I'm too lazy.
npcs_goldmine.lazy_miner.dialogue.idle.3=Maybe some day I'll go back down there.

# Gold Forger
npcs_goldmine.gold_forger.dialogue.hello.1=I love goooold!
npcs_goldmine.gold_forger.dialogue.hello.2=Click me again to open the Gold Forger Shop!

# Iron Forger
npcs_goldmine.iron_forger.dialogue.hello.1=For my wares, you'll have to pay the iron price!
npcs_goldmine.iron_forger.dialogue.hello.2=Seriously though, I accept Coins.
npcs_goldmine.iron_forger.dialogue.hello.3=Click me again to open the Iron Forger Shop!

# Rusty
npcs_goldmine.rusty.dialogue.found_pickaxe.1=You found the Lazy Miner's pickaxe!
npcs_goldmine.rusty.dialogue.found_pickaxe.2=I'll have to put it in my stores.
npcs_goldmine.rusty.dialogue.found_pickaxe.3=Click me again!
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6.1=Hi, I'm the janitor of this mine.
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6.2=You would not believe how many people leave ingots and stones behind them!
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6.3=It drives me insane, but at least you unlocked <green>Auto-pickup<white>.
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6.4=It makes my job a lot easier, but despite that, I still find so many items on the ground.
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6.5=Maybe some of those items are yours? In which case I'll let you buy them back.
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6.1=Hi, I'm the janitor of this mine.
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6.2=You would not believe how many people leave ingots and stones behind them!
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6.3=It drives me insane, but at least you'll unlock <green>Auto-pickup <white>at <dark_aqua>SkyBlock Level 6.
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6.4=It makes my job a lot easier, but despite that, I still find so many items on the ground.
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6.5=Maybe some of those items are yours? In which case I'll let you buy them back.
