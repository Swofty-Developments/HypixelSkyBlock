# Gold Mine NPC Dialogues

# Lazy Miner
npcs_goldmine.lazy_miner.dialogue.first_interaction = Whoops! I lost my good pickaxe again in the mines! That's why I always come prepared with a backup!|It's probably down in the mine somewhere. Can you go find it?
npcs_goldmine.lazy_miner.dialogue.no_pickaxe_found = Find my pickaxe in the Gold Mines! I'm not going back down there...
npcs_goldmine.lazy_miner.dialogue.found_pick_intro = Oh! You already found my pickaxe! That's amazing!|Keep it, it has a special enchantment. Come talk to me when you're ready!
npcs_goldmine.lazy_miner.dialogue.quest_complete = You found it! Thank you so much!|Keep it as a reward. That pickaxe has Smelting Touch - it automatically smelts ores into ingots!|It'll be very useful for collecting iron and gold.
npcs_goldmine.lazy_miner.dialogue.not_reached_deep_caverns = The Deep Caverns are full of strange creatures and expensive treasures.|Reach Mining Level V to gain access!|Have you spelunked the Deep Caverns?|They are full of bountiful treasures, but watch out for those Lapis Zombies!
npcs_goldmine.lazy_miner.dialogue.idle = {month_name} {day} is my resting day!|I'd go mining but I'm too lazy.|Maybe some day I'll go back down there.

# Gold Forger
npcs_goldmine.gold_forger.dialogue.hello = I love goooold!|Click me again to open the Gold Forger Shop!

# Iron Forger
npcs_goldmine.iron_forger.dialogue.hello = For my wares, you'll have to pay the iron price!|Seriously though, I accept Coins.|Click me again to open the Iron Forger Shop!

# Rusty
npcs_goldmine.rusty.dialogue.found_pickaxe = You found the Lazy Miner's pickaxe!|I'll have to put it in my stores.|Click me again!
npcs_goldmine.rusty.dialogue.first_interaction_over_sb_6 = Hi, I'm the janitor of this mine.|You would not believe how many people leave ingots and stones behind them!|It drives me insane, but at least you unlocked <green>Auto-pickup<white>.|It makes my job a lot easier, but despite that, I still find so many items on the ground.|Maybe some of those items are yours? In which case I'll let you buy them back.
npcs_goldmine.rusty.dialogue.first_interaction_below_sb_6 = Hi, I'm the janitor of this mine.|You would not believe how many people leave ingots and stones behind them!|It drives me insane, but at least you'll unlock <green>Auto-pickup <white>at <dark_aqua>SkyBlock Level 6.|It makes my job a lot easier, but despite that, I still find so many items on the ground.|Maybe some of those items are yours? In which case I'll let you buy them back.
