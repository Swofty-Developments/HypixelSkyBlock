# ============================================================================
# Hub NPC Dialogues
# Format: npcs_hub.<npc_id>.dialogue.<dialogue_key> = line1|line2|line3
# Lines are separated by | (pipe) and sent as individual messages with delay.
# Uses MiniMessage format for styling. {player} = player name placeholder.
# ============================================================================

# --- Billy Joe ---
npcs_hub.billy_joe.dialogue.hello = You can hold as many <green>Accessories <white>as you want in your inventory. They will always work.|If you have more then one of the same type of the Accessory in your inventory, <red>only one <white>will work.

# --- Sirius ---
npcs_hub.sirius.dialogue.closed = You shouldn't have of had been able to click me!
npcs_hub.sirius.dialogue.adding_to_auction = Are you here for the Auction? Only the richest players can enter.
npcs_hub.sirius.dialogue.minimum_coins = You need at least <gold>400,000 coins <white>to enter the Dark Auction!
npcs_hub.sirius.dialogue.added_to_auction = You signed up for the Auction!|You'll be warped once it starts...

# --- Salesman ---
npcs_hub.salesman.dialogue.hello = Thank you for supporting the server and allowing us maintain SkyBlock!|If you want to support us, head over to the Hypixel Store<aqua> store.hypixel.net

# --- Baker ---
npcs_hub.baker.dialogue.initial_hello = At the end of each year I bake cakes for everyone in town to celebrate the year.|I made one especially for you, here you go.|I've recently added a <light_purple>New Year Cake Bag <white>to my inventory. Sadly, it's not free! Click me again to open my shop!

# --- Adventurer ---
npcs_hub.adventurer.dialogue.hello = I've seen it all - every island from here to the edge of the world!|Over the years I've acquired a variety of Talismans and Artifact.|For a price, you can have it all!|Click me again to open the Adventurer Shop!

# --- Alchemist ---
npcs_hub.alchemist.dialogue.hello = There is a darkness in you, {player}.|I've seen it in my flames, you are destined for great things.|For now, you shouldn't let it get to your head.

# --- Arthur ---
npcs_hub.arthur.dialogue.dialogue_1 = Fuel makes your Minion work harder for a limited time|There are multiple types of Fuel, like Coal, Enchanted Bread and many more!
npcs_hub.arthur.dialogue.dialogue_2 = If you place your Minions poorly, they will complain!|Open their Menu and look for their Perfect Layout!
npcs_hub.arthur.dialogue.dialogue_3 = Once you unlock a Minion, you also unlock all their Level up recipes!
npcs_hub.arthur.dialogue.dialogue_4 = Use a <green>Budget Hopper<white> to make your Minions automatically sell their work once full!
npcs_hub.arthur.dialogue.dialogue_5 = My favorite Minion Upgrade is the <green>Compactor<white>, sooooo useful!|I have one in my Minion, look!
npcs_hub.arthur.dialogue.dialogue_6 = People always empty the storage of my Minion when I'm not looking!
npcs_hub.arthur.dialogue.dialogue_7 = Minions always have 4 Upgrade Slots where you can place Fuel or else

# --- Seymour ---
npcs_hub.seymour.dialogue.hello = Looking to buy something fancy?

# --- Lonely Philosopher ---
npcs_hub.lonely_philosopher.dialogue.hello = <white>I'm sorry, I have nothing for you.
npcs_hub.lonely_philosopher.dialogue.open_shop = <white>To fast travel or not to fast travel?

# --- Carpenter ---
npcs_hub.carpenter.dialogue.initial_hello = Hi, {player}! Welcome to the <green>Furniture Shop<white>.|Sales are too good right now, I can't keep up with the demand!|Could you bring a <green>stack of White Wool<white> to help replenish my stock?|Sheep over in The Barn drop wool, but you can also purchase it from the <light_purple>Wool Weaver<white>.|She lives in a house not far from here - it's over by the water fountain.
npcs_hub.carpenter.dialogue.completed_quest = Wow, thanks so much for the help!|Carpentry is my passion, I always love to teach others.|Here's the recipe for the <green>Carpentry Table<white>. You can place it in your world and craft furniture that you've unlocked!|You can now gain Carpentry XP by crafting items. Leveling your <green>Carpentry Skill<white> unlocks new furniture recipes!|Some furniture is available exclusively in the Furniture Shop downstairs. Check it out!
npcs_hub.carpenter.dialogue.spoke_again = Check out the Furniture Shop downstairs!|The Furniture Shop is downstairs. Purchase cool furniture down there!

# --- Mining Merchant ---
npcs_hub.mining_merchant.dialogue.hello = My specialities are ores, stone, and mining equipment.|Click me again to open the Miner Shop!

# --- Zog ---
npcs_hub.zog.dialogue.hello = Hello! Have you heard of pet items?|Pet items give your companions bonuses!|I sell all kinds of them if you'd like to try one out!

# --- Jax ---
npcs_hub.jax.dialogue.introduction = Hello {player}<white>! What brings you to my workshop? I forge the newest and most powerful arrows in all of SkyBlock!|If you can prove to me you're a real archer I'll forge you arrows whenever you need them.|Ready to test your skills? Step on the pressure plate and all the targets will light up, if you can shoot them all in 25 seconds, I'll know you're the real deal.
npcs_hub.jax.dialogue.completed_level_one = Wow, you can really shoot a bow!|Well, a deal's a deal! Come to me any time and I'll forge you whatever arrows you need for adventures.|I only have one condition... These are powerful arrows, they can't fall into the wrong hands so keep them in your quiver and don't share them with anyone.

# --- Dusk ---
npcs_hub.dusk.dialogue.hello = You can apply <light_purple>runes <white>to weapons and armor with the <light_purple>Rune Pedestal <white>behind me.|You can also combine two runes for a chance to create a higher level rune with a better effect!

# --- Security Sloth ---
npcs_hub.security_sloth.dialogue.hello = Downloading suspicious mods or visiting untrusted discord servers can put your account at risk. It is upto you to keep your account secure!|Here are some helpful support articles that will help you keep your account more secure and avoid losing valuable progress or items.

# --- Lumber Merchant ---
npcs_hub.lumber_merchant.dialogue.hello = Buy and sell wood and axes with me!|Click me again to open the Lumberjack Shop!

# --- Banker ---
npcs_hub.banker.dialogue.quest_hello = Hello there!|You may want to store your <gold>Coins <white>in a safe place while you are off adventuring.|Storing them in your <gold>Bank <white>keeps them safe and allows you to earn interest at the start of every season!

# --- Bea ---
npcs_hub.bea.dialogue.hello = Hello! Do you have a pet?|Pets are little companions for your adventures in SkyBlock!|Personally, I prefer the <yellow>bee <white>pet!

# --- Elizabeth ---
npcs_hub.elizabeth.dialogue.hello = <white>Hello! Welcome to <aqua>SkyBlock<white>!|<white>I have powerful items to offer, but only to experienced adventurers!|<white>Until then, I suggest leveling up to SkyBlock Level 3!

# --- Clerk Seraphine ---
npcs_hub.clerk_seraphine.dialogue.hello = Welcome to the <aqua>Community Center<white>!|Contribute to community projects, upgrade your account, and more by talking to <light_purple>Elizabeth<white>!|You can also vote in the <aqua>mayor elections <white>by heading through the warp behind me!

# --- Election NPCs ---
npcs_hub.election.clerk_seraphine = Clerk Seraphine
npcs_hub.election.candidate_label = Candidate
npcs_hub.election.click = <yellow><bold>CLICK
npcs_hub.election.running = Running for mayor!
npcs_hub.election.mayor_unknown = Mayor ???
npcs_hub.election.minister_unknown = Minister ????
npcs_hub.election.hello = <red>Hello!!

# --- Gladiator ---
npcs_hub.gladiator.dialogue.hello = Welcome to the <aqua>Colosseum<white>!|Oh...wait. Nevermind.|Here you can join me in drinking away your sorrows.

# --- Weaponsmith ---
npcs_hub.weaponsmith.dialogue.hello = You'll need some strong weapons to survive out in the wild! Lucky for you, I've got some!|Click me again to open the Weaponsmith Shop!

# --- Bartender ---
npcs_hub.bartender.dialogue.quest_hello = Welcome to the Bar, friend!|These are trying times, indeed. The <red>Graveyard <white>is overflowing with monsters! Anyone who comes in is spooked off by the grunts of zombies in the distance.|Could you give me a hand? If you help clear out some of these monsters, I'll pay you for it.
npcs_hub.bartender.dialogue.quest_talk = Clear out some more of those Zombies and I'll pay you greatly for it!
npcs_hub.bartender.dialogue.quest_complete = Words cannot describe how thankful I am!|That whole area is very dangerous, but can be quite rewarding for a warrior such as yourself.|If you're up for the challenge, both the <red>Graveyard<white> and the <red>Spider's Den <white>beyond it are great training grounds for improving your <green>Combat Skill<white>.|For now, here's a reward for helping me out!

# --- Madame Eleanor Q. Goldsworth III ---
npcs_hub.madame_eleanor_q_goldsworth_iii.dialogue.pre_curator = The <aqua>Curator <white>has advised me to direct you back to him.|Please hear what he has to say before coming to me
npcs_hub.madame_eleanor_q_goldsworth_iii.dialogue.post_curator = Don't trust what the <aqua>Curator <white>told you, I am in no way his assistant.|I serve someone much more important.|I offer a <gold>Museum Appraisal Service<white>, which allows you to determine the value of your Museum.|For a one-time fee, I will appraise your Museum's worth each time you modify your Museum.|You may even find yourself atop the <gold>Top Valued Museums <white>in the <blue>Museum Browser<white>!|Additionally, reaching certain valuation thresholds will allow you to purchase <gold>bank upgrades<white>.|In the future, reaching these thresholds will reward even more!

# --- Mad Redstone Engineer ---
npcs_hub.mad_redstone_engineer.dialogue.hello = Every problem in life can be solved with a little redstone.

# --- Auction Master ---
npcs_hub.auction_master.dialogue.quest_hello = Hey there, I'm the Auction Master.|In the <gold>Auction House<white>, you can put your valuable items up for auction!|You may also want to check back here to see what items other players are selling to see if you can get a good deal.|Talk to me or one of the <gold>Auction Agents <white>if you would like to start your first auction or if you want to see the items currently being sold.

# --- Farm Merchant ---
npcs_hub.farm_merchant.dialogue.hello = You can buy and sell harvested crops with me!|Wheat, carrots, potatoes, and melon are my specialties!|Click me again to open the Farmer Shop!

# --- The Handler ---
npcs_hub.the_handler.dialogue.not_prosperous_1 = <light_purple>The Hex <white>will not see you now.
npcs_hub.the_handler.dialogue.not_prosperous_2 = he Hex is troubled by your presence.
npcs_hub.the_handler.dialogue.not_prosperous_3 = There is an absence of <light_purple>prosperity <white>within you.
npcs_hub.the_handler.dialogue.not_prosperous_4 = <light_purple>The Hex <white>does not wish to be tainted with <light_purple>useless <white>items.
npcs_hub.the_handler.dialogue.not_prosperous_5 = <white>The Hex <white>does not have time for you.

# --- Lumber Jack ---
npcs_hub.lumber_jack.dialogue.initial_hello = Timber!|My woodcutting assistant has fallen quite ill! Do you think you could take over for him?|I just need you to chop down some Logs. If you do, I'll even give you his old axe as a reward!|Do you think you could take over for him?
npcs_hub.lumber_jack.dialogue.option_nah = Oh okay... maybe come back later!
npcs_hub.lumber_jack.dialogue.option_accept = Cheers!, Let me tell ya a little about what we're going to be doing.|We will be <green>Foraging<white>! As one of SkyBlock's core skills, Foraging involves cutting down lots of different types of trees!|As you do this, you'll unlock various crafts and useful stat boots that will help in other areas of your adventure.|Here, let me unlock the <green>Foraging skill <white>for you, and then you can get started!|To get you started, please bring me <green>20 Oak Logs<white>! You can break the trees just off the trail to get 'em|<white>Use your fists for now - I'll give you my previous assistant's axe if you can prove your worth!
npcs_hub.lumber_jack.dialogue.spoke_again = Nice job! In return for those logs, I'll give ya this <green>Promising Axe<white>.|It's far less painful than using your fists to punch trees, I'll tell ya that much!|If you feel like Foraging is the thing for you, continue down the path and head towards <green>The Park<white>.|My friend <yellow>Charlie <white>can be found there. I'm sure he'll have some work for you!
npcs_hub.lumber_jack.dialogue.idl_1 = My mate <light_purple>Charlie <white>has a <dark_purple>Treecapitator<white>! With it, he can break down entire trees in a single swipe!
npcs_hub.lumber_jack.dialogue.idle_2 = Have you spoken to my mate <yellow>Charlie <white>over in <green>The Park <white>yet? He could probably use your help.
npcs_hub.lumber_jack.dialogue.idle_3 = Have you enchanted your axe with <green>Efficiency V<white>? It'll help ya break stuff a lot faster.

# --- Builder ---
npcs_hub.builder.dialogue.hello = If you build, they will come!|Click me again to open the Builder Shop!

# --- Curator ---
npcs_hub.curator.dialogue.initial_hello = Welcome, {player}<white>!|After years of work, I finally opened the <blue>Museum<white>!|This world has an incredible amount of interesting gear and rare items, which I would like to showcase.|Would you like to help me fill the Museum? My assistant, <gold>Madame Goldsworth<white>, will even reward you!|I'll show you the list of items that I'm currently looking for.|You can donate any item from the list, and you'll still be able to use those items whenever you want!|However - once you donate an item, it will be <light_purple>Co-op Soulbound <white>to you, meaning that you won't be able to trade, auction or sell the item anymore.|Choose carefully!

# --- Swofty ---
npcs_hub.swofty.dialogue.hello = Make sure to check out our discord server at discord.gg/paper!|Feel free to create a pull request to help us :)

# --- Bazaar ---
npcs_hub.bazaar.dialogue.hello = <red>You need SkyBlock Level 7 to access this feature!

# --- Bazaar Agent ---
npcs_hub.bazaar_agent.dialogue.hello = <red>You need SkyBlock Level 7 to access this feature!

# --- Tia the Fairy ---
npcs_hub.tia_the_fairy.dialogue.hello = Welcome to the <light_purple>Fairy Pond<white>, {player}! I am Tia.|You may have noticed some strange orbs laying around the island.|They are the souls of my fallen sisters.|If you find any more during your travels, please bring them back to me!

# --- Fisherman Gerald ---
npcs_hub.fisherman_gerald.dialogue.below_fishing_5 = Hmm, you're not quite ready yet.|Go talk to the <yellow>Fish Merchant <white>in the <aqua>Fishing Outpost<white>, get geared up, and get fishin'!|Come back once you've reached <green>Fishing Skill V <white>and I'll tell you how you can get to a <green>new island<white>!
npcs_hub.fisherman_gerald.dialogue.first_interaction = Keep the noise down, kid!|If you want to learn about <green>Fishing<white>, go talk to my wife, Fisherwoman Enid.|She's fishing a bit <aqua>upstream<white>. Once she's shown you the ropes, come back and talk to me!

# --- Farmer Rigby ---
npcs_hub.farmer_rigby.dialogue.initial_hello = Howdy, friend!|My cow is sick, she needs some food to replenish her strength.|Could you gather some Wheat from my farm and bring it back to me so that I can feed her? Poor thing.
npcs_hub.farmer_rigby.dialogue.spoke_again = Thank you so much!|My Farm is yours to harvest! Wheat is a valuable resource to collect, you can unlock many cool things by collecting it.

# --- Nicole ---
npcs_hub.nicole.dialogue.hello = Books are mesmerizing.|Their words offer permanence.|Permanence is knowledge.|Knowledge transcends time and space.|Space is only a construct...|<red>Whew! <white>I need some coffee!
npcs_hub.nicole.dialogue.coffee_hello = Thank you!|<light_purple>Elise <white>really wanted this but she is shy.|I'm selecting books for her.|Anything to do with the <dark_red>Calamity <white>or the <light_purple>Riftway <white>at the top of the mountain.

# --- Karis ---
npcs_hub.karis.dialogue.idle = <white>The <green>Abiphone Basic <white>is the best model for beginners.|<white>Between you and me, if you ever want to upgrade it you should travel to the <red>Crimson Isle<white>.|<white>There's this guy named <gold>Udel <white>there - he created the <green>Abiphone<white>. Forgot to patent it, though.|<white>He sells a whole bunch of high-end Abiphones with more features, you should check it out sometime!

# --- Fishing Merchant ---
npcs_hub.fishing_merchant.dialogue.hello = Fishing is my trade.|I buy and sell any fish, rod, or treasure you can find!|Click me again to open the Fisherman Shop!

# --- Gavin ---
npcs_hub.gavin.dialogue.first_interaction = At the end of each year I bake cakes for everyone in town to celebrate the year.|I made one especially for you, here you go.|I've recently added a <light_purple>New Year Cake Bag <white>to my inventory. Sadly, it's not free! Click me again to open my shop!
npcs_hub.gavin.dialogue.idle_1 = You can open your <green>Sea Creature Guide <white>through your <green>Fishing Skill <white>menu, or with <light_purple>/scg<white>!
npcs_hub.gavin.dialogue.idle_2 = I'd rather be out there fishing for <gold>Treasure<white>.|But mum insists I finish my studies first.

# --- Wool Weaver ---
npcs_hub.wool_weaver.dialogue.hello = If wool shrinks when you wash it...|...why don't sheep get smaller when it rains?

# --- Villager Blacksmith ---
npcs_hub.villager_blacksmith.dialogue.initial_hello = I'm the town Blacksmith! I can <green>reforge <white>items for you, for a price.|Reforging usually costs Coins, but since I'm feeling friendly I can reforge your first item for Coal <dark_gray>x10.|Go into the Mine to collect Coal, then come back to learn how to reforge items!
npcs_hub.villager_blacksmith.dialogue.spoke_again = Ahh, excellent!|Reforging items allows you to get the most out of your weapons, armor, and other items by applying stat modifiers to them!|To reforge an item, place an item in my inventory. Reforging costs Coins - the more prestigious items cost more to reforge!|However, this time I will reforge any item for the low price of Coal <dark_gray>x10!

# --- Villager Librarian ---
npcs_hub.villager_librarian.dialogue.quest_hello = Greetings! Welcome to the <aqua>Library<white>!|The <aqua>Library <white>is your one-stop shop for all things enchanting. Enchant items, purchase <green>Enchanted Books<white>, and more!|You can enchant items by clicking any <green>Enchanting Table<white>. Enchanting costs <dark_aqua>experience levels <white>- the more levels you spend, the better enchantments you will receive.|Use the <green>Enchanting Table <white>to enchant an item!

# --- Villager Maths Enjoyer ---
npcs_hub.villager_maths_enjoyer.dialogue.hello = <white>Hey if you really want to know...|<white>The formula to <gold>Magical Power <white>is...|<light_purple>Stats Mult. <white>= <aqua>29.97<yellow>(<green>ln(<aqua>0.0019<gold>MP<green>)<yellow>)^<aqua>1.2|<white>Have fun with that!
