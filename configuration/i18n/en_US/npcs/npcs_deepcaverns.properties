# Lift Operator
npcs_deepcaverns.lift_operator.dialogue.hello.1=Hey Feller!
npcs_deepcaverns.lift_operator.dialogue.hello.2=I control this lift here behind me.
npcs_deepcaverns.lift_operator.dialogue.hello.3=Once you've explored an area I can give you a safe ride back there.
npcs_deepcaverns.lift_operator.dialogue.hello.4=Be careful not to fall down the shaft though, it's a long fall!
npcs_deepcaverns.lift_operator.dialogue.hello.5=Good luck on your adventures.

# Walter
npcs_deepcaverns.walter.dialogue.none.1=With the right tools, you can get through anything!
