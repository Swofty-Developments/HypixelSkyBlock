# Gustave
npcs_thepark.gustave.dialogue.first_interaction.1=There's nothing like island racing!
npcs_thepark.gustave.dialogue.first_interaction.2=I've traveled many islands and this is my favorite to race on. Want to try?
npcs_thepark.gustave.dialogue.first_interaction.3=To complete the race, you'll need to reach the <yellow>opposite side of the island <white>AND come all the way back.
npcs_thepark.gustave.dialogue.first_interaction.4=Start the race by walking over the pressure plate. If you finish in under 2 minutes, I'll reward you for it! Good luck!
npcs_thepark.gustave.dialogue.first_interaction.5=The other end of the race can be found at -407 128 -119 and is also marked by a beacon.
npcs_thepark.gustave.dialogue.first_interaction.6=There are also crit-particle trails to follow.
npcs_thepark.gustave.dialogue.not_too_fast.1=Hey! Come talk to me over here! I'll tell you all about racing!
npcs_thepark.gustave.dialogue.completed_1.1=Not bad, {player}<white>!
npcs_thepark.gustave.dialogue.completed_1.2=I hope you can get better than this!
npcs_thepark.gustave.dialogue.completed_1.3=Here's a <green>Polished Pebble<white>. I found it laying around...
npcs_thepark.gustave.dialogue.completed_1.4=Try again, but this time come back in 1 minute or less!
npcs_thepark.gustave.dialogue.completed_2.1=You're getting much faster!
npcs_thepark.gustave.dialogue.completed_2.2=Use my <green>Hunter Knife<white>. Holding it somehow makes me go faster.
npcs_thepark.gustave.dialogue.completed_2.3=See if you can beat 32 seconds!
npcs_thepark.gustave.dialogue.completed_3.1=Now we're cooking! You're getting close to my record!
npcs_thepark.gustave.dialogue.completed_3.2=Here's an trinket I've found in the caverns behind the waterfall.
npcs_thepark.gustave.dialogue.completed_3.3=Finish the race in under 18 seconds and come talk to me!
npcs_thepark.gustave.dialogue.completed_4.1=You did it! Congratulations, {player}<white>. You are now faster than <green>Gustave<white>!
npcs_thepark.gustave.dialogue.completed_4.2=I've been racing this island so fast that some bark from the trees snatched right off!
npcs_thepark.gustave.dialogue.completed_4.3=Here's a rare piece of <blue>Silky Lichen<white>. Maybe you can do something with it.
npcs_thepark.gustave.dialogue.completed_4.4=I have this lichen could improve some weapons!
npcs_thepark.gustave.dialogue.idle_1.1=You're always welcome to try the race again. Just run over the pressure plate to begin!
npcs_thepark.gustave.dialogue.idle_2.1=It's a great day to go for a run!

# Kelly
npcs_thepark.kelly.dialogue.first_interaction.1=Hey hey! Did <yellow>Charlie <white>send you?
npcs_thepark.kelly.dialogue.option_yes.1=Awesome!
npcs_thepark.kelly.dialogue.option_yes.2=Okay, so basically.
npcs_thepark.kelly.dialogue.option_yes.3=I was breaking this tree right here, right.
npcs_thepark.kelly.dialogue.option_yes.4=But then I broke my axe!
npcs_thepark.kelly.dialogue.option_yes.5=And now I don't want to break any more trees, in case I break any more axes!
npcs_thepark.kelly.dialogue.option_yes.6=Anyways, if you can bring me <green>128 Spruce Logs<white>, I'll give you a reward!
npcs_thepark.kelly.dialogue.option_no.1=Strange... I could've sworn you'd met.
npcs_thepark.kelly.dialogue.option_no.2=Anyways, I was breaking this tree right here, right.
npcs_thepark.kelly.dialogue.option_no.3=But then I broke my axe!
npcs_thepark.kelly.dialogue.option_no.4=And now I don't want to break any more trees, in case I break any more axes!
npcs_thepark.kelly.dialogue.option_no.5=If you can bring me <green>128 Spruce Logs<white>, I'll give you a reward!
npcs_thepark.kelly.dialogue.during_collect.1=Bring me <green>128 Spruce Logs<white>!
npcs_thepark.kelly.dialogue.during_collect.2=That's two stacks of them, if you're struggling to do the math!
npcs_thepark.kelly.dialogue.after_collecting.1=Oh, that's amazing! Thank you so much!
npcs_thepark.kelly.dialogue.after_collecting.2=Now I can take this all back to <yellow>Charlie<white>, and say <bold>I did it!
npcs_thepark.kelly.dialogue.after_collecting.3=And then, with the coins he gives me, I can get a <dark_aqua>Spruce Minion<white>!
npcs_thepark.kelly.dialogue.after_collecting.4=You should check out the <green>Dark Thicket <white>next. Be careful though!
npcs_thepark.kelly.dialogue.after_collecting.5=I've heard some people are holding a <red>Cult Meeting <white>there <red><bold>RIGHT NOW!
npcs_thepark.kelly.dialogue.idle_1.1=I talk a lot, so I've learned to just tune myself out
npcs_thepark.kelly.dialogue.idle_2.1=I can't control what I say to people. I spend the whole day talking.
npcs_thepark.kelly.dialogue.idle_3.1=Did you check out the <red>Cult over in the <green>Dark Thicket <white>yet.

# Melody
npcs_thepark.melody.dialogue.intro.1=Hello! <light_purple>♫
npcs_thepark.melody.dialogue.option.1=Yes, I'm fine, though my beloved <light_purple>Harp <white>was broken to pieces by the storm.
npcs_thepark.melody.dialogue.option.2=If you would be so willing, could you bring me the materials so that I may make another?
npcs_thepark.melody.dialogue.option.3=My brother was on his way to help, but you got here first.
npcs_thepark.melody.dialogue.option.4=If you'd be so kind as to bring me <green>512 Acacia Logs<white>, I'll be able to do the rest
npcs_thepark.melody.dialogue.thank_you.1=Thank you so much! <light_purple>❤
npcs_thepark.melody.dialogue.thank_you.2=I already have some string, so I can just use this wood to fashion the frame of the harp.
npcs_thepark.melody.dialogue.thank_you.3=Now, if I'm doing this right, this goes here and...
npcs_thepark.melody.dialogue.thank_you.4=It worked! This harp looks and sounds even more beautiful than the last! <light_purple>♪
npcs_thepark.melody.dialogue.thank_you.5=Thank you for your help - please take this as a reward.
npcs_thepark.melody.dialogue.thank_you.6=Talk to me again if you ever want to givee my <light_purple>Harp <white>a try!

# Romero
npcs_thepark.romero.dialogue.romero_bring_item.1=Bring the item I gave you to Juliette!
npcs_thepark.romero.dialogue.romero_bring_item_missing.1=Bring the item I gave you to Juliette!
npcs_thepark.romero.dialogue.romero_bring_item_missing.2=If you lost the item, we can fix that!
npcs_thepark.romero.dialogue.romero_bring_item_missing.3=Although, you will have to cover my expenses, considering the sentimental value...
npcs_thepark.romero.dialogue.r_q1_start.1=I'm... trying to find gold...
npcs_thepark.romero.dialogue.r_q1_start.2=but I can only find sand and stone here!
npcs_thepark.romero.dialogue.r_q1_start.3=I heard of a gold mine in the Savanna Woodland.
npcs_thepark.romero.dialogue.r_q1_start.4=I'd like to craft a gift for my beloved Juliette.
npcs_thepark.romero.dialogue.r_q1_start.5=Could you find some gold for me, please?
npcs_thepark.romero.dialogue.r_q1_complete.1=Thank you so much!
npcs_thepark.romero.dialogue.r_q1_complete.2=Here, could you do me a favor and bring this gift back to Juliette?
npcs_thepark.romero.dialogue.r_q2_start.1=Groceries?
npcs_thepark.romero.dialogue.r_q2_start.2=Haha!
npcs_thepark.romero.dialogue.r_q2_start.3=I'm here to get a flower bouquet for Juliette.
npcs_thepark.romero.dialogue.r_q2_start.4=Could you help out and get some flowers?
npcs_thepark.romero.dialogue.r_q2_wrong_material.1=I was thinking of a bouquet of roses.
npcs_thepark.romero.dialogue.r_q2_1_poppy.1=Just one? That's not much of a bouquet!
npcs_thepark.romero.dialogue.r_q2_2_7_poppies.1=Going to need a few more than that!
npcs_thepark.romero.dialogue.r_q2_8_11_poppies.1=I love roses! Can you get more?
npcs_thepark.romero.dialogue.r_q2_12_14_poppies.1=That's a lot of flowers! Maybe a few more...
npcs_thepark.romero.dialogue.r_q2_complete.1=Wow, they're beautiful!
npcs_thepark.romero.dialogue.r_q2_complete.2=Please bring the bouquet to Juliette!
npcs_thepark.romero.dialogue.r_q3_start.1=I love emeralds!
npcs_thepark.romero.dialogue.r_q3_start.2=There's emerald on everything I like!
npcs_thepark.romero.dialogue.r_q3_start.3=This one can't be dislodged!
npcs_thepark.romero.dialogue.r_q3_start.4=Could you bring me some emerald?
npcs_thepark.romero.dialogue.r_q3_insufficient.1=I'm going to need a full stack of those!
npcs_thepark.romero.dialogue.r_q3_enchanted_emerald.1=Very cool, but regular emeralds will do the trick.
npcs_thepark.romero.dialogue.r_q3_enchanted_block.1=Although I adore this pristine piece of emerald, I don't need it yet.
npcs_thepark.romero.dialogue.r_q3_block.1=I don't need a whole block!
npcs_thepark.romero.dialogue.r_q3_complete.1=Am
npcs_thepark.romero.dialogue.r_q3_complete.2=-az-
npcs_thepark.romero.dialogue.r_q3_complete.3=-ing!
npcs_thepark.romero.dialogue.r_q3_complete.4=Now bring this gift to Juliette!
npcs_thepark.romero.dialogue.r_q4_start.1=Hey, you again!
npcs_thepark.romero.dialogue.r_q4_start.2=I wanted mushrooms to concoct a stew,
npcs_thepark.romero.dialogue.r_q4_start.3=but these big red ones won't cut it.
npcs_thepark.romero.dialogue.r_q4_start.4=I need some decent mushrooms.
npcs_thepark.romero.dialogue.r_q4_red_mushroom.1=I can't cook a gourmet stew with tiny mushrooms!
npcs_thepark.romero.dialogue.r_q4_red_mushroom.2=I need bigger ones!
npcs_thepark.romero.dialogue.r_q4_brown_mushroom.1=That's not the color of mushroom I'm looking for.
npcs_thepark.romero.dialogue.r_q4_red_block.1=Sweet! Just what I need!
npcs_thepark.romero.dialogue.r_q4_red_block.2=EXCEPT... Could you enchant it?
npcs_thepark.romero.dialogue.r_q4_red_block.3=I need the perfect stew for my beloved Juliette.
npcs_thepark.romero.dialogue.r_q4_brown_block.1=That's a big mushroom that I don't need.
npcs_thepark.romero.dialogue.r_q4_brown_block.2=It's well known that good stews aren't made from brown mushrooms.
npcs_thepark.romero.dialogue.r_q4_enchanted_brown_block.1=I need red mushrooms.
npcs_thepark.romero.dialogue.r_q4_complete.1=Fantastic!
npcs_thepark.romero.dialogue.r_q4_complete.2=There's some stew for Juliette!
npcs_thepark.romero.dialogue.r_q4_complete.3=Mmh! Tastes great!
npcs_thepark.romero.dialogue.r_q5_start.1=So cold! I wish I had coffee right now...
npcs_thepark.romero.dialogue.r_q5_start.2=I want to reach the moon for Juliette.
npcs_thepark.romero.dialogue.r_q5_start.3=Literally!
npcs_thepark.romero.dialogue.r_q5_start.4=I wish I could jump like a Rabbit and grab a chunk of it.
npcs_thepark.romero.dialogue.r_q5_wrong_potion.1=A potion might do the trick, but not quite that one.
npcs_thepark.romero.dialogue.r_q5_rabbit_not_6.1=Rabbit potion? Sounds great!
npcs_thepark.romero.dialogue.r_q5_rabbit_not_6.2=Although... could you bring a more potent one?
npcs_thepark.romero.dialogue.r_q5_rabbit_not_6.3=I don't want to take any chances!
npcs_thepark.romero.dialogue.r_q5_no_coffee.1=Awesome potion!
npcs_thepark.romero.dialogue.r_q5_no_coffee.2=Any chance you could have it taste like coffee?
npcs_thepark.romero.dialogue.r_q5_no_coffee.3=Come back with a caffeinated beverage, thanks!
npcs_thepark.romero.dialogue.r_q5_complete.1=Thanks!
npcs_thepark.romero.dialogue.r_q5_complete.2=See ya later!
npcs_thepark.romero.dialogue.r_q5_complete.3=Bring the chunk to Juliette!
npcs_thepark.romero.dialogue.r_q6_start.1=Hi friend!
npcs_thepark.romero.dialogue.r_q6_start.2=I want to make a secret gift for Juliette.
npcs_thepark.romero.dialogue.r_q6_start.3=I collected tons of gold...
npcs_thepark.romero.dialogue.r_q6_start.4=Now I just need enough heat to melt it!
npcs_thepark.romero.dialogue.r_q6_flint.1=That's not even close to hot!
npcs_thepark.romero.dialogue.r_q6_lava.1=*tastes it*
npcs_thepark.romero.dialogue.r_q6_lava.2=This is the kind of lava I need...
npcs_thepark.romero.dialogue.r_q6_lava.3=Except I need hotter.
npcs_thepark.romero.dialogue.r_q6_magical_lava.1=This is too magical for my taste.
npcs_thepark.romero.dialogue.r_q6_complete.1=Perfect!
npcs_thepark.romero.dialogue.r_q6_complete.2=Thank you so much for helping with all my gift ideas.
npcs_thepark.romero.dialogue.r_q6_complete.3=Can you bring this one to Juliette?
npcs_thepark.romero.dialogue.r_q7_start.1=I'm trying to solve this Rubix Prism.
npcs_thepark.romero.dialogue.r_q7_start.2=Going to need someone wicked smart to solve it.
npcs_thepark.romero.dialogue.r_q7_low_int.1=You're pretty smart.
npcs_thepark.romero.dialogue.r_q7_low_int.2=I bet you wish you were smarter, though!
npcs_thepark.romero.dialogue.r_q7_mid_int.1=While very astute,
npcs_thepark.romero.dialogue.r_q7_mid_int.2=you don't have quite what it takes for the Prism!
npcs_thepark.romero.dialogue.r_q7_high_int.1=Can you somehow get even more intelligence?
npcs_thepark.romero.dialogue.r_q7_almost_genius.1=I can definitely see it, your brain barely fits your head.
npcs_thepark.romero.dialogue.r_q7_almost_genius.2=Just not quite genius enough to solve the Prism!
npcs_thepark.romero.dialogue.r_q7_threshold.1=If I was to quantify it, I'd say you need 1,291 Intelligence.
npcs_thepark.romero.dialogue.r_q7_complete.1=Incredible!
npcs_thepark.romero.dialogue.r_q7_complete.2=You solved the Prism!
npcs_thepark.romero.dialogue.r_q7_complete.3=Please, bring it to Juliette and show her how smart I am.
npcs_thepark.romero.dialogue.r_q8_start.1=Juliette keeps talking to me about this other person.
npcs_thepark.romero.dialogue.r_q8_start.2=I don't know what's going on, they meet over and over!
npcs_thepark.romero.dialogue.r_q8_start.3=Our love is stronger than theirs!
npcs_thepark.romero.dialogue.r_q8_start.4=I'm waiting for this other person to show up.
npcs_thepark.romero.dialogue.r_q8_start.5=I'll need my favorite weapon, can you fetch it for me?
npcs_thepark.romero.dialogue.r_q8_jerry.1=Go away.
npcs_thepark.romero.dialogue.r_q8_emerald.1=That's not even a weapon!
npcs_thepark.romero.dialogue.r_q8_emerald.2=I do like it though!
npcs_thepark.romero.dialogue.r_q8_weak_sword.1=That sword is weak!
npcs_thepark.romero.dialogue.r_q8_weak_sword.2=Besides, would you really give it to me?
npcs_thepark.romero.dialogue.r_q8_complete.1=This is exactly what I need!
npcs_thepark.romero.dialogue.r_q8_complete.2=Now I just have to wait for the pretendent.
npcs_thepark.romero.dialogue.r_q8_complete.3=Please bring this poem to Juliette.
npcs_thepark.romero.dialogue.r_q8_complete.4=I hope she'll see the reason.
npcs_thepark.romero.dialogue.r_q9_start.1=It's you, {player}!
npcs_thepark.romero.dialogue.r_q9_start.2=I need your help to win Juliette back.
npcs_thepark.romero.dialogue.r_q9_start.3=My plan is to assemble the greatest bouquet ever!
npcs_thepark.romero.dialogue.r_q9_start.4=I need a ridiculous amount of flowers.
npcs_thepark.romero.dialogue.r_q9_complete.1=That's exquisite!!
npcs_thepark.romero.dialogue.r_q9_complete.2=With this, I can get enough flowers to win Juliette back!
npcs_thepark.romero.dialogue.r_q10_before_suit.1={player}! You're the best person to turn the day into something memorable!
npcs_thepark.romero.dialogue.r_q10_before_suit.2=But first, you should wear something nice!
npcs_thepark.romero.dialogue.r_q10_after_suit.1=Looking slick!
npcs_thepark.romero.dialogue.r_q10_after_suit.2=You really look stunning!
npcs_thepark.romero.dialogue.r_q10_after_suit.3=Thank you so much for reuniting Juliette and I.
npcs_thepark.romero.dialogue.r_q10_after_suit.4=Please, one last time, give this to Juliette.
npcs_thepark.romero.dialogue.idle.1=I love Juliette!

# Juliette
npcs_thepark.juliette.dialogue.completing_step_not_holding.1=You found <yellow>Romero<white>?
npcs_thepark.juliette.dialogue.completing_step_not_holding.2=Did he have anything for me?
npcs_thepark.juliette.dialogue.q1_start.1=Nice to meet you!
npcs_thepark.juliette.dialogue.q1_start.2=Could you find my dear <yellow>Romero<white>?
npcs_thepark.juliette.dialogue.q1_start.3=He's in a cave somewhere under the <green>Savanna Woodland<white>.
npcs_thepark.juliette.dialogue.q1_start.4=...
npcs_thepark.juliette.dialogue.q1_start.5=Oh!
npcs_thepark.juliette.dialogue.q1_start.6=He wears glasses and blends well in a crowd!
npcs_thepark.juliette.dialogue.q1_complete.1=You found Romero? That's weird, I just saw him!
npcs_thepark.juliette.dialogue.q1_complete.2=He wanted me to have this? So sweet!
npcs_thepark.juliette.dialogue.q1_complete.3=...
npcs_thepark.juliette.dialogue.q1_complete.4=A yellow rock? What's the point of that?
npcs_thepark.juliette.dialogue.q1_complete.5=Here, you keep it!
npcs_thepark.juliette.dialogue.q2_start.1=Since you're here, can you find Romero again?
npcs_thepark.juliette.dialogue.q2_start.2=He said he was getting groceries at the downtown markets.
npcs_thepark.juliette.dialogue.q2_complete.1=Romero? He just came over with the groceries.
npcs_thepark.juliette.dialogue.q2_complete.2=These flowers are for me?
npcs_thepark.juliette.dialogue.q2_complete.3=That's so kind of you!
npcs_thepark.juliette.dialogue.q2_complete.4=You know I'm with Romero, right?
npcs_thepark.juliette.dialogue.q3_start.1=Dear, sorry for the inconvenience...
npcs_thepark.juliette.dialogue.q3_start.2=Can you please find Romero again?
npcs_thepark.juliette.dialogue.q3_start.3=He's at some sort of emerald altar...
npcs_thepark.juliette.dialogue.q3_complete.1=Oof! Why did you bring this all the way here?
npcs_thepark.juliette.dialogue.q3_complete.2=How is that a gift?
npcs_thepark.juliette.dialogue.q3_complete.3=Just keep it! I don't want this!
npcs_thepark.juliette.dialogue.q4_start.1=What I want is Romero!
npcs_thepark.juliette.dialogue.q4_start.2=For some reason, he's now looking for...
npcs_thepark.juliette.dialogue.q4_start.3=The largest, most evil patch of fungus ever!
npcs_thepark.juliette.dialogue.q4_complete.1=Stew? I love stew!
npcs_thepark.juliette.dialogue.q4_complete.2=...
npcs_thepark.juliette.dialogue.q4_complete.3=!!!
npcs_thepark.juliette.dialogue.q4_complete.4=Yuck!!!
npcs_thepark.juliette.dialogue.q4_complete.5=Yuck!!!
npcs_thepark.juliette.dialogue.q4_complete.6=Yuck!!!
npcs_thepark.juliette.dialogue.q4_complete.7=Yuck!!!
npcs_thepark.juliette.dialogue.q4_complete.8=Yuck!!!
npcs_thepark.juliette.dialogue.q4_complete.9=DISGUSTING!
npcs_thepark.juliette.dialogue.q4_complete.10=Is that a stew from hell?
npcs_thepark.juliette.dialogue.q4_complete.11=Maybe Romero should give you cooking lessons!
npcs_thepark.juliette.dialogue.q5_start.1=Oh! I love Romero! He has so many skills.
npcs_thepark.juliette.dialogue.q5_start.2=Did you know he likes photography?
npcs_thepark.juliette.dialogue.q5_start.3=Just now, he went to take pictures of the old castle.
npcs_thepark.juliette.dialogue.q5_start.4=Go find him!
npcs_thepark.juliette.dialogue.q5_complete.1=You really believe that this is from the Moon?
npcs_thepark.juliette.dialogue.q5_complete.2=How? Someone flew up there?
npcs_thepark.juliette.dialogue.q5_complete.3=Thanks, I guess.
npcs_thepark.juliette.dialogue.q5_complete.4=Actually, I heard Romero flew close to the Sun.
npcs_thepark.juliette.dialogue.q5_complete.5=Sounds more like a metaphor, like...
npcs_thepark.juliette.dialogue.q6_start.1=He went to where gold is smelted.
npcs_thepark.juliette.dialogue.q6_start.2=Please find him, wherever that is!
npcs_thepark.juliette.dialogue.q6_complete.1=This is a wonderful gift!
npcs_thepark.juliette.dialogue.q6_complete.2=I will keep this one for myself.
npcs_thepark.juliette.dialogue.q6_complete.3=Sometimes, some things have to remain a mystery.
npcs_thepark.juliette.dialogue.q7_start.1=About something not so secret, can you get in touch with Romero?
npcs_thepark.juliette.dialogue.q7_start.2=He told me he's in his home.
npcs_thepark.juliette.dialogue.q7_complete.1=Uh? Romero solved his cube?
npcs_thepark.juliette.dialogue.q7_complete.2=That's unbelievable.
npcs_thepark.juliette.dialogue.q7_complete.3=No, really, I don't believe it at all.
npcs_thepark.juliette.dialogue.q8_start.1=I don't know why Romero is trying to be so unlike himself lately.
npcs_thepark.juliette.dialogue.q8_start.2=I like him just the way he is!
npcs_thepark.juliette.dialogue.q8_start.3=He says he's getting equipment for a duel.
npcs_thepark.juliette.dialogue.q8_start.4=Can you find Romero before he hurts himself?
npcs_thepark.juliette.dialogue.q8_complete.1=This is a wonderful poem.
npcs_thepark.juliette.dialogue.q8_complete.2=But, does he really think there's someone else?
npcs_thepark.juliette.dialogue.q8_complete.3=I can't possibly imagine why he'd think that.
npcs_thepark.juliette.dialogue.q9_start.1=Romero went to meditate at his retreat.
npcs_thepark.juliette.dialogue.q9_start.2=It's the smallest house in SkyBlock.
npcs_thepark.juliette.dialogue.q9_start.3=Please find him, I'm worried!
npcs_thepark.juliette.dialogue.q9_complete.1=Another gift from Romero?
npcs_thepark.juliette.dialogue.q9_complete.2=Thank you for delivering it.
npcs_thepark.juliette.dialogue.q9_complete.3=I don't know how Romero has such hard a time understanding that I LOVE HIM.
npcs_thepark.juliette.dialogue.q9_complete.4=I like him just the way he is!
npcs_thepark.juliette.dialogue.q9_complete.5=I don't need tons of gifts to know that.
npcs_thepark.juliette.dialogue.q10_before_suit.1=It's decided, this is the day!
npcs_thepark.juliette.dialogue.q10_before_suit.2=We're making it official!
npcs_thepark.juliette.dialogue.q10_after_suit.1=We can't thank you enough for bringing us together!
npcs_thepark.juliette.dialogue.q10_after_suit.2=You're the best, {player}!

# Charlie
npcs_thepark.charlie.dialogue.initial_hello.1=Howdy! Yer a friend of <green>Lumber Jack<white>, are ya?
npcs_thepark.charlie.dialogue.initial_hello.2=Well, works for me!
npcs_thepark.charlie.dialogue.initial_hello.3=I need <green>64 Birch Logs<white>. Could you grab 'em for me?
npcs_thepark.charlie.dialogue.initial_hello.4=Do that, and then we can talk!
npcs_thepark.charlie.dialogue.talk_again.1=<green>The Park <white>is home to many different kinds of wood. Each kind has its own <yellow>collection<white>.
npcs_thepark.charlie.dialogue.talk_again.2=Me and my mates each gather a specific type of wood, and then split it all evenly so we can all increase our different collections!
npcs_thepark.charlie.dialogue.talk_again.3=I wanted <yellow>Kelly <white>to get some <green>Spruce Logs <white>for us today, but I've not seen her in a while... Can you maybe look for her in the <green>Spruce Woods<white>?
npcs_thepark.charlie.dialogue.idle_1.1=So much wood to chop, such little time...
npcs_thepark.charlie.dialogue.idle_2.1=So you heard about that weird <red>Cult <white>over in the <green>Dark Thicket<white>? I'm considerin' joining them.
npcs_thepark.charlie.dialogue.idle_3.1=What? <green>Lumber Jack <white>said I have a <dark_purple>Treecapitator<white>? In my dreams...

# Molbert
npcs_thepark.molbert.dialogue.intro.1=<gold>Moles<white>, you see. They have been burrowing everywhere, their tunnels are disrupting the landscape, they ruined the <dark_purple><italic>beauty <white>of this place. It's gotten hard to ignore.
npcs_thepark.molbert.dialogue.intro.2=You need an experienced person to handle the situation.
npcs_thepark.molbert.dialogue.intro.3=Those troublesome creatures are ruining everything and must be dealt with. Do you understand?
npcs_thepark.molbert.dialogue.intro.4=This park deserves better and I want see it flourish like it used to be.
npcs_thepark.molbert.dialogue.intro.5=Let us keep this between us, and I will <green>generously reward <white>you for your efforts.
npcs_thepark.molbert.dialogue.intro.6=The moles must be dealt with, and I am sure you will do so quickly and quietly.
npcs_thepark.molbert.dialogue.option_mole.1=<red><bold>Ridiculous! <white>How could I be a mole if I am <aqua>wearing human clothes<white>, huh?
npcs_thepark.molbert.dialogue.option_mole.2=Have you seen moles wearing human clothes before?
npcs_thepark.molbert.dialogue.option_mole.3=I don't think so. Now get back to the issue!
npcs_thepark.molbert.dialogue.quick_intro.1=The moles must be dealt with, and I am sure you will do so quickly and quietly.
npcs_thepark.molbert.dialogue.option_sure.1=Great. First thing we need is to build some <dark_purple>traps<white>.
npcs_thepark.molbert.dialogue.option_sure.2=For that however, I need <green>512 Jungle Logs<white>, should be enough to get things going.
npcs_thepark.molbert.dialogue.option_sure.3=Moles <gold>loooove carrots<white>, they are just too good to resist.
npcs_thepark.molbert.dialogue.option_sure.4=Don't worry, I've got a stash ready.
npcs_thepark.molbert.dialogue.option_sure.5=Just thinking about them <italic>makes me<white>... Uhm I mean <italic>makes them <white>come out of their hiding space.
npcs_thepark.molbert.dialogue.after_resources.1=Fantastic, that's all I needed to build the <dark_purple>traps<white>.
npcs_thepark.molbert.dialogue.after_resources.2=It will take some time to assemble them, so you should <green>come back later<white>.
npcs_thepark.molbert.dialogue.after_coming_back.1=The <dark_purple>traps <white>are ready for use; All that remains is to set them up in the <green>right place<white>. Once you find the ideal spots, go ahead and deploy them.
npcs_thepark.molbert.dialogue.after_placing_traps.1=Good job, partner. Now we only need to <gold>wait <white>for the <green>right moment <white>for these pests to show up.
npcs_thepark.molbert.dialogue.after_placing_traps.2=This might take some time, so you should come back later.
npcs_thepark.molbert.dialogue.stuck.1=Hey.. <italic>uhm <white>partner! I <bold>swear <white>it's not what you think!
npcs_thepark.molbert.dialogue.stuck.2=Could you lend me a hand here, I can <green>explain everything<white>!
npcs_thepark.molbert.dialogue.explain.1=<green>Thank you so much<white>, I was stuck there for <italic>at least ??? minutes<white>, I was almost gone for good.
npcs_thepark.molbert.dialogue.explain.2=<italic>I.. I <white>must have <light_purple>slipped by accident <white>and then fell right into the <dark_purple>trap<white>! ... <italic>Yes<white>, <bold>that's what happened<white>!
npcs_thepark.molbert.dialogue.explain.3=...and then I ate the <gold>carrot <white>because I was almost starving in there!
npcs_thepark.molbert.dialogue.option_iknow.1=<white>Ok, fine you caught me. But <red>please don't tell the others<white>, they wouldn't want to be my friends anymore if they knew the truth.
npcs_thepark.molbert.dialogue.option_iknow.2=Here, take this <green>compensation <white>for all the trouble I made you go through.
npcs_thepark.molbert.dialogue.option_iknow.3=I hope you forgive me after this and we can still be <gold>friends<white>.
npcs_thepark.molbert.dialogue.idle_1.1=I wish I could be in love just like <blue>Romero <white>& <light_purple>Juliette<white>.
npcs_thepark.molbert.dialogue.idle_2.1=I hope you forgive me after this and we can still be <gold>friends<white>.

# Ryan
npcs_thepark.ryan.dialogue.startled.1=<red>AAAAHHHHH! <white>Don't startle me like that bro!
npcs_thepark.ryan.dialogue.startled.2=<white>Y'know, someone as stealthy as you could be a useful member of the <red>Campfire Cult<white>.
npcs_thepark.ryan.dialogue.startled.3=<white>What do you say to that?
npcs_thepark.ryan.dialogue.accept.1=Cool! Anyways, there's just one thing you have to do before you can join.
npcs_thepark.ryan.dialogue.accept.2=Stand in the <gold><bold>CAMPFIRE<white>!
npcs_thepark.ryan.dialogue.accept_2.1=Yeah don't worry, it's not as hot as it looks.
npcs_thepark.ryan.dialogue.accept_2.2=If you can last for <green>10 seconds <white>while standing in the campfire, I'll give you a reward!
npcs_thepark.ryan.dialogue.talk.1=Wow, you did it!
npcs_thepark.ryan.dialogue.talk.2=Nice job, hotshot! I'd give you the Campfire Initiate Badge I right now, but I'm out of wood to make one with...
npcs_thepark.ryan.dialogue.talk.3=Sorry about that...
npcs_thepark.ryan.dialogue.talk.4=I need to keep watch and make sure nobody blows out thee <gold>Campfire<white>, but if you can grab me <green>256 Dark Oak Logs<white>, I'll make one for ya!
npcs_thepark.ryan.dialogue.give_logs.1=Thanks for the wood! Here's your badge, as promised!
npcs_thepark.ryan.dialogue.give_logs.2=A Campfire Initiate Badge I, for our latest initiate, {player}<white>!
npcs_thepark.ryan.dialogue.give_logs.3=I can upgrade that badge for you as you survive more <red>Campfire Trials<white>, you know?
npcs_thepark.ryan.dialogue.give_logs.4=<white>Simply stand in the <gold>campfire <white>whenever you think you're ready!
npcs_thepark.ryan.dialogue.give_logs.5=<white>But be careful, though, as each trial burns a little hotter than the last!

# Melancholic Viking
npcs_thepark.melancholic_viking.dialogue.intro.1=I last saw the sea <aqua>{years_months} <white>ago.
npcs_thepark.melancholic_viking.dialogue.intro.2=I wish I could remember what it felt like!
npcs_thepark.melancholic_viking.dialogue.intro.3=Sadly, my memory is now my worst enemy.
npcs_thepark.melancholic_viking.dialogue.intro.4=Please, help me remember the <aqua>sea<white>.
npcs_thepark.melancholic_viking.dialogue.holding_boat.1=Wow!
npcs_thepark.melancholic_viking.dialogue.holding_boat.2=A boat!
npcs_thepark.melancholic_viking.dialogue.holding_boat.3=Throw them at people you hate
npcs_thepark.melancholic_viking.dialogue.starting_to_splash.1=<green>YES! <white>This totally reminds me of the sea!
npcs_thepark.melancholic_viking.dialogue.starting_to_splash.2=Although... there were <green>more <white>fishes back then.
npcs_thepark.melancholic_viking.dialogue.enough_splashes.1=<green><bold>WOW! <white>This <aqua>feels <white>just like on my Drakkar!
npcs_thepark.melancholic_viking.dialogue.enough_splashes.2=I suddenly feel so great!
npcs_thepark.melancholic_viking.dialogue.enough_splashes.3=Thanks for bringing <yellow>joy <yellow>joy <white>to an old viking!
npcs_thepark.melancholic_viking.dialogue.enough_splashes.4=Take a look at my wares!
npcs_thepark.melancholic_viking.dialogue.splashing_no_requirements.1=<yellow>Wow! Nice move! <white>There just isn't the ambience to fully appreciate it.
npcs_thepark.melancholic_viking.dialogue.holding_ice.1=Don't you have some liquid water?
npcs_thepark.melancholic_viking.dialogue.holding_raw_fish.1=I prefer when the fishes are lively and go splish-splash in the water!
npcs_thepark.melancholic_viking.dialogue.holding_fishing_rod.1=It's a nice thought, but I don't feel like fishing right now.
npcs_thepark.melancholic_viking.dialogue.holding_magical_water_bucket.1=There's as much water here as an ocean.
npcs_thepark.melancholic_viking.dialogue.holding_magical_water_bucket.2=If only you could pour it somewhere!

# Worker Xavier
npcs_thepark.worker_xavier.dialogue.intro.1=<red>WOAH WOAH! <white>Look out there!
npcs_thepark.worker_xavier.dialogue.intro.2=There's been a <dark_aqua>huge storm<white>! It knocked down a bunch of trees - it's been a safety hazard!
npcs_thepark.worker_xavier.dialogue.intro.3=Oh my goodness! I forgot about <light_purple>Melody<white>! She's still over on <light_purple>Melody's Plateau<white>
npcs_thepark.worker_xavier.dialogue.intro.4=Can you go and make sure she's okay?
npcs_thepark.worker_xavier.dialogue.idle.1=Acacia trees are native to the <green>Savanna Woodland<white>.
npcs_thepark.worker_xavier.dialogue.idle.2=Don't feel bad about knocking them down - they regrow real fast!

# Master Tactician Funk
npcs_thepark.master_tactician_funk.dialogue.intro.1=Welcome to the Woodlands!
npcs_thepark.master_tactician_funk.dialogue.intro.2=I use all sorts of wood types to create strong and useful items!
npcs_thepark.master_tactician_funk.dialogue.intro.3=Here. Check theme out!
