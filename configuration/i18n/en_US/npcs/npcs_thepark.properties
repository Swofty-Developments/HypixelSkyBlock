# The Park NPC Dialogues

# Gustave
npcs_thepark.gustave.dialogue.first_interaction = There's nothing like island racing!|I've traveled many islands and this is my favorite to race on. Want to try?|To complete the race, you'll need to reach the <yellow>opposite side of the island <white>AND come all the way back.|Start the race by walking over the pressure plate. If you finish in under 2 minutes, I'll reward you for it! Good luck!|The other end of the race can be found at -407 128 -119 and is also marked by a beacon.|There are also crit-particle trails to follow.
npcs_thepark.gustave.dialogue.not_too_fast = Hey! Come talk to me over here! I'll tell you all about racing!
npcs_thepark.gustave.dialogue.completed_1 = Not bad, {player}<white>!|I hope you can get better than this!|Here's a <green>Polished Pebble<white>. I found it laying around...|Try again, but this time come back in 1 minute or less!
npcs_thepark.gustave.dialogue.completed_2 = You're getting much faster!|Use my <green>Hunter Knife<white>. Holding it somehow makes me go faster.|See if you can beat 32 seconds!
npcs_thepark.gustave.dialogue.completed_3 = Now we're cooking! You're getting close to my record!|Here's an trinket I've found in the caverns behind the waterfall.|Finish the race in under 18 seconds and come talk to me!
npcs_thepark.gustave.dialogue.completed_4 = You did it! Congratulations, {player}<white>. You are now faster than <green>Gustave<white>!|I've been racing this island so fast that some bark from the trees snatched right off!|Here's a rare piece of <blue>Silky Lichen<white>. Maybe you can do something with it.|I have this lichen could improve some weapons!
npcs_thepark.gustave.dialogue.idle_1 = You're always welcome to try the race again. Just run over the pressure plate to begin!
npcs_thepark.gustave.dialogue.idle_2 = It's a great day to go for a run!

# Kelly
npcs_thepark.kelly.dialogue.first_interaction = Hey hey! Did <yellow>Charlie <white>send you?
npcs_thepark.kelly.dialogue.option_yes = Awesome!|Okay, so basically.|I was breaking this tree right here, right.|But then I broke my axe!|And now I don't want to break any more trees, in case I break any more axes!|Anyways, if you can bring me <green>128 Spruce Logs<white>, I'll give you a reward!
npcs_thepark.kelly.dialogue.option_no = Strange... I could've sworn you'd met.|Anyways, I was breaking this tree right here, right.|But then I broke my axe!|And now I don't want to break any more trees, in case I break any more axes!|If you can bring me <green>128 Spruce Logs<white>, I'll give you a reward!
npcs_thepark.kelly.dialogue.during_collect = Bring me <green>128 Spruce Logs<white>!|That's two stacks of them, if you're struggling to do the math!
npcs_thepark.kelly.dialogue.after_collecting = Oh, that's amazing! Thank you so much!|Now I can take this all back to <yellow>Charlie<white>, and say <bold>I did it!|And then, with the coins he gives me, I can get a <dark_aqua>Spruce Minion<white>!|You should check out the <green>Dark Thicket <white>next. Be careful though!|I've heard some people are holding a <red>Cult Meeting <white>there <red><bold>RIGHT NOW!
npcs_thepark.kelly.dialogue.idle_1 = I talk a lot, so I've learned to just tune myself out
npcs_thepark.kelly.dialogue.idle_2 = I can't control what I say to people. I spend the whole day talking.
npcs_thepark.kelly.dialogue.idle_3 = Did you check out the <red>Cult over in the <green>Dark Thicket <white>yet.

# Melody
npcs_thepark.melody.dialogue.intro = Hello! <light_purple>♫
npcs_thepark.melody.dialogue.option = Yes, I'm fine, though my beloved <light_purple>Harp <white>was broken to pieces by the storm.|If you would be so willing, could you bring me the materials so that I may make another?|My brother was on his way to help, but you got here first.|If you'd be so kind as to bring me <green>512 Acacia Logs<white>, I'll be able to do the rest
npcs_thepark.melody.dialogue.thank_you = Thank you so much! <light_purple>❤|I already have some string, so I can just use this wood to fashion the frame of the harp.|Now, if I'm doing this right, this goes here and...|It worked! This harp looks and sounds even more beautiful than the last! <light_purple>♪|Thank you for your help - please take this as a reward.|Talk to me again if you ever want to givee my <light_purple>Harp <white>a try!

# Romero
npcs_thepark.romero.dialogue.romero_bring_item = Bring the item I gave you to Juliette!
npcs_thepark.romero.dialogue.romero_bring_item_missing = Bring the item I gave you to Juliette!|If you lost the item, we can fix that!|Although, you will have to cover my expenses, considering the sentimental value...
npcs_thepark.romero.dialogue.r_q1_start = I'm... trying to find gold...|but I can only find sand and stone here!|I heard of a gold mine in the Savanna Woodland.|I'd like to craft a gift for my beloved Juliette.|Could you find some gold for me, please?
npcs_thepark.romero.dialogue.r_q1_complete = Thank you so much!|Here, could you do me a favor and bring this gift back to Juliette?
npcs_thepark.romero.dialogue.r_q2_start = Groceries?|Haha!|I'm here to get a flower bouquet for Juliette.|Could you help out and get some flowers?
npcs_thepark.romero.dialogue.r_q2_wrong_material = I was thinking of a bouquet of roses.
npcs_thepark.romero.dialogue.r_q2_1_poppy = Just one? That's not much of a bouquet!
npcs_thepark.romero.dialogue.r_q2_2_7_poppies = Going to need a few more than that!
npcs_thepark.romero.dialogue.r_q2_8_11_poppies = I love roses! Can you get more?
npcs_thepark.romero.dialogue.r_q2_12_14_poppies = That's a lot of flowers! Maybe a few more...
npcs_thepark.romero.dialogue.r_q2_complete = Wow, they're beautiful!|Please bring the bouquet to Juliette!
npcs_thepark.romero.dialogue.r_q3_start = I love emeralds!|There's emerald on everything I like!|This one can't be dislodged!|Could you bring me some emerald?
npcs_thepark.romero.dialogue.r_q3_insufficient = I'm going to need a full stack of those!
npcs_thepark.romero.dialogue.r_q3_enchanted_emerald = Very cool, but regular emeralds will do the trick.
npcs_thepark.romero.dialogue.r_q3_enchanted_block = Although I adore this pristine piece of emerald, I don't need it yet.
npcs_thepark.romero.dialogue.r_q3_block = I don't need a whole block!
npcs_thepark.romero.dialogue.r_q3_complete = Am|-az-|-ing!|Now bring this gift to Juliette!
npcs_thepark.romero.dialogue.r_q4_start = Hey, you again!|I wanted mushrooms to concoct a stew,|but these big red ones won't cut it.|I need some decent mushrooms.
npcs_thepark.romero.dialogue.r_q4_red_mushroom = I can't cook a gourmet stew with tiny mushrooms!|I need bigger ones!
npcs_thepark.romero.dialogue.r_q4_brown_mushroom = That's not the color of mushroom I'm looking for.
npcs_thepark.romero.dialogue.r_q4_red_block = Sweet! Just what I need!|EXCEPT... Could you enchant it?|I need the perfect stew for my beloved Juliette.
npcs_thepark.romero.dialogue.r_q4_brown_block = That's a big mushroom that I don't need.|It's well known that good stews aren't made from brown mushrooms.
npcs_thepark.romero.dialogue.r_q4_enchanted_brown_block = I need red mushrooms.
npcs_thepark.romero.dialogue.r_q4_complete = Fantastic!|There's some stew for Juliette!|Mmh! Tastes great!
npcs_thepark.romero.dialogue.r_q5_start = So cold! I wish I had coffee right now...|I want to reach the moon for Juliette.|Literally!|I wish I could jump like a Rabbit and grab a chunk of it.
npcs_thepark.romero.dialogue.r_q5_wrong_potion = A potion might do the trick, but not quite that one.
npcs_thepark.romero.dialogue.r_q5_rabbit_not_6 = Rabbit potion? Sounds great!|Although... could you bring a more potent one?|I don't want to take any chances!
npcs_thepark.romero.dialogue.r_q5_no_coffee = Awesome potion!|Any chance you could have it taste like coffee?|Come back with a caffeinated beverage, thanks!
npcs_thepark.romero.dialogue.r_q5_complete = Thanks!|See ya later!|Bring the chunk to Juliette!
npcs_thepark.romero.dialogue.r_q6_start = Hi friend!|I want to make a secret gift for Juliette.|I collected tons of gold...|Now I just need enough heat to melt it!
npcs_thepark.romero.dialogue.r_q6_flint = That's not even close to hot!
npcs_thepark.romero.dialogue.r_q6_lava = *tastes it*|This is the kind of lava I need...|Except I need hotter.
npcs_thepark.romero.dialogue.r_q6_magical_lava = This is too magical for my taste.
npcs_thepark.romero.dialogue.r_q6_complete = Perfect!|Thank you so much for helping with all my gift ideas.|Can you bring this one to Juliette?
npcs_thepark.romero.dialogue.r_q7_start = I'm trying to solve this Rubix Prism.|Going to need someone wicked smart to solve it.
npcs_thepark.romero.dialogue.r_q7_low_int = You're pretty smart.|I bet you wish you were smarter, though!
npcs_thepark.romero.dialogue.r_q7_mid_int = While very astute,|you don't have quite what it takes for the Prism!
npcs_thepark.romero.dialogue.r_q7_high_int = Can you somehow get even more intelligence?
npcs_thepark.romero.dialogue.r_q7_almost_genius = I can definitely see it, your brain barely fits your head.|Just not quite genius enough to solve the Prism!
npcs_thepark.romero.dialogue.r_q7_threshold = If I was to quantify it, I'd say you need 1,291 Intelligence.
npcs_thepark.romero.dialogue.r_q7_complete = Incredible!|You solved the Prism!|Please, bring it to Juliette and show her how smart I am.
npcs_thepark.romero.dialogue.r_q8_start = Juliette keeps talking to me about this other person.|I don't know what's going on, they meet over and over!|Our love is stronger than theirs!|I'm waiting for this other person to show up.|I'll need my favorite weapon, can you fetch it for me?
npcs_thepark.romero.dialogue.r_q8_jerry = Go away.
npcs_thepark.romero.dialogue.r_q8_emerald = That's not even a weapon!|I do like it though!
npcs_thepark.romero.dialogue.r_q8_weak_sword = That sword is weak!|Besides, would you really give it to me?
npcs_thepark.romero.dialogue.r_q8_complete = This is exactly what I need!|Now I just have to wait for the pretendent.|Please bring this poem to Juliette.|I hope she'll see the reason.
npcs_thepark.romero.dialogue.r_q9_start = It's you, {player}!|I need your help to win Juliette back.|My plan is to assemble the greatest bouquet ever!|I need a ridiculous amount of flowers.
npcs_thepark.romero.dialogue.r_q9_complete = That's exquisite!!|With this, I can get enough flowers to win Juliette back!
npcs_thepark.romero.dialogue.r_q10_before_suit = {player}! You're the best person to turn the day into something memorable!|But first, you should wear something nice!
npcs_thepark.romero.dialogue.r_q10_after_suit = Looking slick!|You really look stunning!|Thank you so much for reuniting Juliette and I.|Please, one last time, give this to Juliette.
npcs_thepark.romero.dialogue.idle = I love Juliette!

# Juliette
npcs_thepark.juliette.dialogue.completing_step_not_holding = You found <yellow>Romero<white>?|Did he have anything for me?
npcs_thepark.juliette.dialogue.q1_start = Nice to meet you!|Could you find my dear <yellow>Romero<white>?|He's in a cave somewhere under the <green>Savanna Woodland<white>.|...|Oh!|He wears glasses and blends well in a crowd!
npcs_thepark.juliette.dialogue.q1_complete = You found Romero? That's weird, I just saw him!|He wanted me to have this? So sweet!|...|A yellow rock? What's the point of that?|Here, you keep it!
npcs_thepark.juliette.dialogue.q2_start = Since you're here, can you find Romero again?|He said he was getting groceries at the downtown markets.
npcs_thepark.juliette.dialogue.q2_complete = Romero? He just came over with the groceries.|These flowers are for me?|That's so kind of you!|You know I'm with Romero, right?
npcs_thepark.juliette.dialogue.q3_start = Dear, sorry for the inconvenience...|Can you please find Romero again?|He's at some sort of emerald altar...
npcs_thepark.juliette.dialogue.q3_complete = Oof! Why did you bring this all the way here?|How is that a gift?|Just keep it! I don't want this!
npcs_thepark.juliette.dialogue.q4_start = What I want is Romero!|For some reason, he's now looking for...|The largest, most evil patch of fungus ever!
npcs_thepark.juliette.dialogue.q4_complete = Stew? I love stew!|...|!!!|Yuck!!!|Yuck!!!|Yuck!!!|Yuck!!!|Yuck!!!|DISGUSTING!|Is that a stew from hell?|Maybe Romero should give you cooking lessons!
npcs_thepark.juliette.dialogue.q5_start = Oh! I love Romero! He has so many skills.|Did you know he likes photography?|Just now, he went to take pictures of the old castle.|Go find him!
npcs_thepark.juliette.dialogue.q5_complete = You really believe that this is from the Moon?|How? Someone flew up there?|Thanks, I guess.|Actually, I heard Romero flew close to the Sun.|Sounds more like a metaphor, like...
npcs_thepark.juliette.dialogue.q6_start = He went to where gold is smelted.|Please find him, wherever that is!
npcs_thepark.juliette.dialogue.q6_complete = This is a wonderful gift!|I will keep this one for myself.|Sometimes, some things have to remain a mystery.
npcs_thepark.juliette.dialogue.q7_start = About something not so secret, can you get in touch with Romero?|He told me he's in his home.
npcs_thepark.juliette.dialogue.q7_complete = Uh? Romero solved his cube?|That's unbelievable.|No, really, I don't believe it at all.
npcs_thepark.juliette.dialogue.q8_start = I don't know why Romero is trying to be so unlike himself lately.|I like him just the way he is!|He says he's getting equipment for a duel.|Can you find Romero before he hurts himself?
npcs_thepark.juliette.dialogue.q8_complete = This is a wonderful poem.|But, does he really think there's someone else?|I can't possibly imagine why he'd think that.
npcs_thepark.juliette.dialogue.q9_start = Romero went to meditate at his retreat.|It's the smallest house in SkyBlock.|Please find him, I'm worried!
npcs_thepark.juliette.dialogue.q9_complete = Another gift from Romero?|Thank you for delivering it.|I don't know how Romero has such hard a time understanding that I LOVE HIM.|I like him just the way he is!|I don't need tons of gifts to know that.
npcs_thepark.juliette.dialogue.q10_before_suit = It's decided, this is the day!|We're making it official!
npcs_thepark.juliette.dialogue.q10_after_suit = We can't thank you enough for bringing us together!|You're the best, {player}!

# Charlie
npcs_thepark.charlie.dialogue.initial_hello = Howdy! Yer a friend of <green>Lumber Jack<white>, are ya?|Well, works for me!|I need <green>64 Birch Logs<white>. Could you grab 'em for me?|Do that, and then we can talk!
npcs_thepark.charlie.dialogue.talk_again = <green>The Park <white>is home to many different kinds of wood. Each kind has its own <yellow>collection<white>.|Me and my mates each gather a specific type of wood, and then split it all evenly so we can all increase our different collections!|I wanted <yellow>Kelly <white>to get some <green>Spruce Logs <white>for us today, but I've not seen her in a while... Can you maybe look for her in the <green>Spruce Woods<white>?
npcs_thepark.charlie.dialogue.idle_1 = So much wood to chop, such little time...
npcs_thepark.charlie.dialogue.idle_2 = So you heard about that weird <red>Cult <white>over in the <green>Dark Thicket<white>? I'm considerin' joining them.
npcs_thepark.charlie.dialogue.idle_3 = What? <green>Lumber Jack <white>said I have a <dark_purple>Treecapitator<white>? In my dreams...

# Molbert
npcs_thepark.molbert.dialogue.intro = <gold>Moles<white>, you see. They have been burrowing everywhere, their tunnels are disrupting the landscape, they ruined the <dark_purple><italic>beauty <white>of this place. It's gotten hard to ignore.|You need an experienced person to handle the situation.|Those troublesome creatures are ruining everything and must be dealt with. Do you understand?|This park deserves better and I want see it flourish like it used to be.|Let us keep this between us, and I will <green>generously reward <white>you for your efforts.|The moles must be dealt with, and I am sure you will do so quickly and quietly.
npcs_thepark.molbert.dialogue.option_mole = <red><bold>Ridiculous! <white>How could I be a mole if I am <aqua>wearing human clothes<white>, huh?|Have you seen moles wearing human clothes before?|I don't think so. Now get back to the issue!
npcs_thepark.molbert.dialogue.quick_intro = The moles must be dealt with, and I am sure you will do so quickly and quietly.
npcs_thepark.molbert.dialogue.option_sure = Great. First thing we need is to build some <dark_purple>traps<white>.|For that however, I need <green>512 Jungle Logs<white>, should be enough to get things going.|Moles <gold>loooove carrots<white>, they are just too good to resist.|Don't worry, I've got a stash ready.|Just thinking about them <italic>makes me<white>... Uhm I mean <italic>makes them <white>come out of their hiding space.
npcs_thepark.molbert.dialogue.after_resources = Fantastic, that's all I needed to build the <dark_purple>traps<white>.|It will take some time to assemble them, so you should <green>come back later<white>.
npcs_thepark.molbert.dialogue.after_coming_back = The <dark_purple>traps <white>are ready for use; All that remains is to set them up in the <green>right place<white>. Once you find the ideal spots, go ahead and deploy them.
npcs_thepark.molbert.dialogue.after_placing_traps = Good job, partner. Now we only need to <gold>wait <white>for the <green>right moment <white>for these pests to show up.|This might take some time, so you should come back later.
npcs_thepark.molbert.dialogue.stuck = Hey.. <italic>uhm <white>partner! I <bold>swear <white>it's not what you think!|Could you lend me a hand here, I can <green>explain everything<white>!
npcs_thepark.molbert.dialogue.explain = <green>Thank you so much<white>, I was stuck there for <italic>at least ??? minutes<white>, I was almost gone for good.|<italic>I.. I <white>must have <light_purple>slipped by accident <white>and then fell right into the <dark_purple>trap<white>! ... <italic>Yes<white>, <bold>that's what happened<white>!|...and then I ate the <gold>carrot <white>because I was almost starving in there!
npcs_thepark.molbert.dialogue.option_iknow = <white>Ok, fine you caught me. But <red>please don't tell the others<white>, they wouldn't want to be my friends anymore if they knew the truth.|Here, take this <green>compensation <white>for all the trouble I made you go through.|I hope you forgive me after this and we can still be <gold>friends<white>.
npcs_thepark.molbert.dialogue.idle_1 = I wish I could be in love just like <blue>Romero <white>& <light_purple>Juliette<white>.
npcs_thepark.molbert.dialogue.idle_2 = I hope you forgive me after this and we can still be <gold>friends<white>.

# Ryan
npcs_thepark.ryan.dialogue.startled = <red>AAAAHHHHH! <white>Don't startle me like that bro!|<white>Y'know, someone as stealthy as you could be a useful member of the <red>Campfire Cult<white>.|<white>What do you say to that?
npcs_thepark.ryan.dialogue.accept = Cool! Anyways, there's just one thing you have to do before you can join.|Stand in the <gold><bold>CAMPFIRE<white>!
npcs_thepark.ryan.dialogue.accept_2 = Yeah don't worry, it's not as hot as it looks.|If you can last for <green>10 seconds <white>while standing in the campfire, I'll give you a reward!
npcs_thepark.ryan.dialogue.talk = Wow, you did it!|Nice job, hotshot! I'd give you the Campfire Initiate Badge I right now, but I'm out of wood to make one with...|Sorry about that...|I need to keep watch and make sure nobody blows out thee <gold>Campfire<white>, but if you can grab me <green>256 Dark Oak Logs<white>, I'll make one for ya!
npcs_thepark.ryan.dialogue.give_logs = Thanks for the wood! Here's your badge, as promised!|A Campfire Initiate Badge I, for our latest initiate, {player}<white>!|I can upgrade that badge for you as you survive more <red>Campfire Trials<white>, you know?|<white>Simply stand in the <gold>campfire <white>whenever you think you're ready!|<white>But be careful, though, as each trial burns a little hotter than the last!

# Melancholic Viking
npcs_thepark.melancholic_viking.dialogue.intro = I last saw the sea <aqua>{years_months} <white>ago.|I wish I could remember what it felt like!|Sadly, my memory is now my worst enemy.|Please, help me remember the <aqua>sea<white>.
npcs_thepark.melancholic_viking.dialogue.holding_boat = Wow!|A boat!|Throw them at people you hate
npcs_thepark.melancholic_viking.dialogue.starting_to_splash = <green>YES! <white>This totally reminds me of the sea!|Although... there were <green>more <white>fishes back then.
npcs_thepark.melancholic_viking.dialogue.enough_splashes = <green><bold>WOW! <white>This <aqua>feels <white>just like on my Drakkar!|I suddenly feel so great!|Thanks for bringing <yellow>joy <yellow>joy <white>to an old viking!|Take a look at my wares!
npcs_thepark.melancholic_viking.dialogue.splashing_no_requirements = <yellow>Wow! Nice move! <white>There just isn't the ambience to fully appreciate it.
npcs_thepark.melancholic_viking.dialogue.holding_ice = Don't you have some liquid water?
npcs_thepark.melancholic_viking.dialogue.holding_raw_fish = I prefer when the fishes are lively and go splish-splash in the water!
npcs_thepark.melancholic_viking.dialogue.holding_fishing_rod = It's a nice thought, but I don't feel like fishing right now.
npcs_thepark.melancholic_viking.dialogue.holding_magical_water_bucket = There's as much water here as an ocean.|If only you could pour it somewhere!

# Worker Xavier
npcs_thepark.worker_xavier.dialogue.intro = <red>WOAH WOAH! <white>Look out there!|There's been a <dark_aqua>huge storm<white>! It knocked down a bunch of trees - it's been a safety hazard!|Oh my goodness! I forgot about <light_purple>Melody<white>! She's still over on <light_purple>Melody's Plateau<white>|Can you go and make sure she's okay?
npcs_thepark.worker_xavier.dialogue.idle = Acacia trees are native to the <green>Savanna Woodland<white>.|Don't feel bad about knocking them down - they regrow real fast!

# Master Tactician Funk
npcs_thepark.master_tactician_funk.dialogue.intro = Welcome to the Woodlands!|I use all sorts of wood types to create strong and useful items!|Here. Check theme out!
