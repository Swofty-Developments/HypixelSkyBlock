# Geo
npcs_dwarvenmines.geo.dialogue.initial_hello.1=<green>Gemstones <reset>have magical properties and can be applied to some special items.
npcs_dwarvenmines.geo.dialogue.initial_hello.2=There are <green>12 <reset>different Gemstones, all of them having their own unique properties!
npcs_dwarvenmines.geo.dialogue.initial_hello.3=For example, adding <red>Ruby <reset>to armor will increase its <red>❤ Health<reset>, while <light_purple>Jasper <reset>increases <red>❁ Strength<reset>.
npcs_dwarvenmines.geo.dialogue.initial_hello.4=The more pure the Gemstone - the stronger the effect!
npcs_dwarvenmines.geo.dialogue.initial_hello.5=Only some items can have Gemstones applied, and you can remove them any time.
npcs_dwarvenmines.geo.dialogue.initial_hello.6=Use the <light_purple>Gemstone Grinder <reset>next to me to apply Gemstones to items!
npcs_dwarvenmines.geo.dialogue.idle_1.1=The more pure the Gemstone - the stronger the effect!
npcs_dwarvenmines.geo.dialogue.idle_1.2=There are several qualities of Gemstone, including <white>Rough<reset>, <green>Flawed<reset>, and <blue>Fine<reset>.
npcs_dwarvenmines.geo.dialogue.idle_1.3=The highest quality of Gemstone - <gold>Perfect <reset>- will increase your stats the most!
npcs_dwarvenmines.geo.dialogue.idle_2.1=Not all items can have Gemstones applied to them.
npcs_dwarvenmines.geo.dialogue.idle_2.2=Check out the <light_purple>Gemstone Grinder <reset>menu to check which items work with it!
npcs_dwarvenmines.geo.dialogue.idle_3.1=Use the <light_purple>Gemstone Grinder <reset>next to me to apply Gemstones to items!

# Abstract Royal Guard (shared dialogue for NPCRoyalGuardOne & NPCRoyalGuardTwo)
npcs_dwarvenmines.royal_guard.dialogue.1 = <white>There are no miners like the dwarves.
npcs_dwarvenmines.royal_guard.dialogue.2 = <white>STAND BACK!
npcs_dwarvenmines.royal_guard.dialogue.3 = <white>Great treasures lie ahead, but at what cost?
npcs_dwarvenmines.royal_guard.dialogue.4 = <white>Behold a fellow holder of Heart of the Mountain!
npcs_dwarvenmines.royal_guard.dialogue.5 = <white>Watch yourself, traveller. There are creatures about.

# Castle Guard One
npcs_dwarvenmines.castle_guard_one.dialogue.idle.1=<white>Last week they promoted me from guarding the exit to guarding the entrance! Still the same spot but I gladly take that promotion!

# Castle Guard Two
npcs_dwarvenmines.castle_guard_two.dialogue.idle.1=<white>This guy isn't the sharpest hammer in the smithy!

# Castle Guard Three
npcs_dwarvenmines.castle_guard_three.dialogue.idle.1=<white>I'm guarding the whole kingdom.

# Castle Guard Four
npcs_dwarvenmines.castle_guard_four.dialogue.idle.1=<white>I'm guarding the whole kingdom.

# Castle Guard Five
npcs_dwarvenmines.castle_guard_five.dialogue.idle.1=<white>I'm a guard.

# Castle Guard Six
npcs_dwarvenmines.castle_guard_six.dialogue.idle.1=<white>I, Murdohr, son of Murdohr the Third, Commander of the Phoenix Forge, and Warden of the Holy Pickaxe, am guarding this wall.

# Castle Guard Seven
npcs_dwarvenmines.castle_guard_seven.dialogue.idle.1=<white>I am guarding the lava.

# Castle Guard Eight
npcs_dwarvenmines.castle_guard_eight.dialogue.idle.1=<white>I am guarding nothing.

# Emissary Braum
npcs_dwarvenmines.emissary_braum.dialogue.first_interaction.1=I am the King's favorite Emissary, which is why I'm the furthest away from him!
npcs_dwarvenmines.emissary_braum.dialogue.first_interaction.2=Commissions inside the Crystal Hollows are different from the ones in the Dwarven Mines.
npcs_dwarvenmines.emissary_braum.dialogue.first_interaction.3=Click me again to receive your first set of Crystal Hollows commissions.
npcs_dwarvenmines.emissary_braum.dialogue.first_interaction.4=Once you complete them, come back to me!

# Silnar
npcs_dwarvenmines.silnar.dialogue.idle.1=<white>See that giant cliff with the <light_purple>giant crystal<white>?
npcs_dwarvenmines.silnar.dialogue.idle.2=<aqua>At night<white>, my friends host a <dark_purple>secret meeting <white>in a nearby <dark_purple>secret cave<white>.
npcs_dwarvenmines.silnar.dialogue.idle.3=<white>Drop by some time, our <dark_purple>secret club <white>is open!
npcs_dwarvenmines.silnar.dialogue.idle.4=<white>If my friends approve of you, they'll give you a special item.
npcs_dwarvenmines.silnar.dialogue.idle.5=<white>Come back to me then and show it to me!
npcs_dwarvenmines.silnar.dialogue.wearing_fallen_star_helmet.1=<white>Hurrah! A fellow member of the <dark_purple>Cult of the Fallen Star<white>!
npcs_dwarvenmines.silnar.dialogue.wearing_fallen_star_helmet.2=<white>Hey, I've crafted new tech to let us locate <dark_purple>Fallen Stars <white>easily.
npcs_dwarvenmines.silnar.dialogue.wearing_fallen_star_helmet.3=<white>Check it out!
npcs_dwarvenmines.silnar.dialogue.after_claiming_fallen_star_lozenge.1=<white>With the <dark_purple>Fallen Star Lozenge<white>, you can find <dark_purple>Fallen Stars <white>much easier!
npcs_dwarvenmines.silnar.dialogue.after_claiming_fallen_star_lozenge.2=<white>Now go find some stars, but don't forget about the next meeting of the <dark_purple>Cult<white>!
npcs_dwarvenmines.silnar.dialogue.after_claiming_fallen_star_lozenge.3=<white>I expect to see you there!
