# --- GUIStashMaterial ---
gui_stash.material.title = Material Stash
gui_stash.material.title_paged = Material Stash ({page}/{max_page})

gui_stash.material.fill_inventory = <green>Fill Inventory
gui_stash.material.fill_inventory.lore = <gray>Pick up as many stashed materials\n<gray>as can fit in your inventory.\n\n<gray>Materials stashed: <yellow>{count}\n<gray>Material types: <yellow>{types}\n\n<yellow>Click to fill inventory!

