gui_sbmenu.main.skyblock_leveling.lore = <gray>Your SkyBlock Level: <dark_gray>[{level_display}<dark_gray>]\n \n<gray>Determine how far you've\n<gray>progressed in SkyBlock and earn\n<gray>rewards from completing unique\n<gray>tasks.\n \n<gray>Progress to Level {next_level}\n{next_level_display}\n \n<yellow>Click to view!
