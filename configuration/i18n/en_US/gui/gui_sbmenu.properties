gui_sbmenu.main.your_bags.lore = <gray>Different bags allow you to store\n<gray>many different items inside!\n \n<yellow>Click to view!
gui_sbmenu.main.pets = <green>Pets
gui_sbmenu.main.pets.lore = <gray>View and manage all of your\n<gray>Pets.\n \n<gray>Level up your pets faster by\n<gray>gaining XP in their favourite\n<gray>skill!\n \n<gray>Selected pet: {selected_pet}\n \n<yellow>Click to view!
