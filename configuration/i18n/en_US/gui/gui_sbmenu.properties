gui_sbmenu.main.skills.lore = <gray>View your Skill progression and\n<gray>rewards.\n \n<yellow>Click to view!
gui_sbmenu.main.collections = <green>Collections
gui_sbmenu.main.collections.lore = <gray>View all of the items available in\n<gray>SkyBlock. Collect more of an item to\n<gray>unlock rewards on your way to\n<gray>becoming a master of SkyBlock!\n \n{collection_display}\n \n<yellow>Click to view!
