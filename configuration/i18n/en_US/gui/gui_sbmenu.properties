gui_sbmenu.main.recipe_book.lore = <gray>Through your adventure, you will\n<gray>unlock recipes for all kinds of\n<gray>special items! You can view how to\n<gray>craft these items here.\n \n{mission_display}\n \n<yellow>Click to view!
