gui_sbmenu.main.quests.lore = <gray>Each island has its own series of\n<aqua>Chapters <gray>for you to complete!\n \n<gray>Complete tasks within a Chapter to\n<gray>earn small <gold>rewards<gray>, or complete\n<gray>entire Chapters to earn big ones!\n \n<gray>Some islands also have <green>Quests <gray>for\n<gray>you to complete! Some items can only\n<gray>be obtained through Quests.\n \n<yellow>Click to view!
