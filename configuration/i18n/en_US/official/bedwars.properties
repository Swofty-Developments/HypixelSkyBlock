bed_wars.3799="Through battle, one can reach Enlightenment."
bed_wars.3800="You shall be rewarded."
bed_wars.3801="You are one with the battlefield."
bed_wars.3802="I can see that."
bed_wars.3803="You have done well, and shall be rewarded for it."
bed_wars.3804="You are looking kinda... sus."
bed_wars.3805="Are you the murderer?"
bed_wars.3806="No, you wouldn't be, or I would already be dead!"
bed_wars.3807="I need clues as to who killed this innocent man."
bed_wars.3808="Can you look for some around here? Or on the Floating Isles?"
bed_wars.3809="Use this"
bed_wars.3810="I think I might have a few suspects."
bed_wars.3811="You gather the clues, and I'll gather the suspects."
bed_wars.3812="These are the suspects we found near the murder area."
bed_wars.3813="Talk to them and see if you can figure out who the murderer is."
bed_wars.3814="Feel free to review the clues in your inventory."
bed_wars.3815="The Murderer is now in custody, thank you for your help."
bed_wars.3816="Inspector Mya Sterling"
bed_wars.3817="Bill Starr"
bed_wars.3818="The name's Bill Starr."
bed_wars.3819="I've survived them all."
bed_wars.3820="Pixelville, Thorin, Caelum, I've seen it all."
bed_wars.3821="Somehow, the one thing that eludes me, is the Blitz Star."
bed_wars.3822="Years of Blitz and I still don't have one. What are the odds?"
bed_wars.3823="I'm thinking of quitting Blitz."
bed_wars.3824="Years of Blitz and I still don't have a star."
bed_wars.3825="Maybe I should have given up a long time ago?"
bed_wars.3826="A Blitz Star?"
bed_wars.3827="You found one!"
bed_wars.3828="And you somehow took it out of the game and brought it here... what."
bed_wars.3829="Are you giving it to me? That's awesome. Maybe I'll keep playing Blitz."
bed_wars.3830="Seeing this star really makes me think I'll eventually get one."
bed_wars.3831="This star is beautiful..."
bed_wars.3832="Cheerful Chap"
bed_wars.3833="I keep hearing about this mysterious owner, WHO IS HE?"
bed_wars.3834="I wish I could meet him. Maybe we'd be good friends."
bed_wars.3835="I don't tend to sleep very well at night, so I don't tend to stay here long."
bed_wars.3836="I wish I could get more sleep."
bed_wars.3837="If only I had a <italic><bold>*blip*"
bed_wars.3838="Fatigued Fella"
bed_wars.3839="We absolutely did it, wow. I saw you running, that was pretty cool."
bed_wars.3840="Me? I took the easy path, I'm surprised you didn't just follow me."
bed_wars.3841="You went straight to the hard mode path. I knew you had it in you."
bed_wars.3842="Now that should get the owner's attention!"
bed_wars.3843="Thanks again for helping me. Feel free to check out the temple any time."
bed_wars.3844="Looks like you're going to need a bigger wallet to enter this temple."
bed_wars.3845="Oh hey, its you!"
bed_wars.3846="How did you... no matter."
bed_wars.3847="I need to open this door, but I need to blow it up. Can you help me?"
bed_wars.3848="Bring me some explosives or something."
bed_wars.3849="Go help the people at the Hotel - someone's bound to give you something you need."
bed_wars.3850="You got this from Jeremy Jagger, didn't you?"
bed_wars.3851="I can recognize his handiwork instantly. Its really bad."
bed_wars.3852="... it looks like we made a small tunnel in the corner there."
bed_wars.3853="Let's go in."
bed_wars.3854="The air is poisoned here. We'll need some sort of mask to breathe through."
bed_wars.3855="Isn't that Ratman's mask?"
bed_wars.3856="That could help us breathe through this."
bed_wars.3857="... are you a cosplayer? I read all of Ratman's comics when I was a young lad."
bed_wars.3858="This one is super high quality - you could fool me if you told me it was the real thing."
bed_wars.3859="Hold on, don't step on the bridge just yet."
bed_wars.3860="Its cursed. It'll throw you off instantly."
bed_wars.3861="We need something to render it inert."
bed_wars.3862="We need something that would cancel out the curse to render the bridge inert"
bed_wars.3863="That'll do. See you on the other side."
bed_wars.3864="There it is - the golden figurine of the Sandman."
bed_wars.3865="Have you heard of him? He's well known in all sorts of folklore stories."
bed_wars.3866="This is what we're looking for, my friend!"
bed_wars.3867="But to avoid traps, I need something to swap it with..."
bed_wars.3868="Something light, but also clean."
bed_wars.3869="I need to replace the figurine with something light."
bed_wars.3870="Small, and clean, so its shiny like the figurine."
bed_wars.3871="Maybe someone at the hotel has something that could help?"
bed_wars.3872="A... murder knife?"
bed_wars.3873="You could have just told me its a knife, no need to mention murder."
bed_wars.3874="That's a bit of a stretch... but it'll do."
bed_wars.3875="Talk to me when you're ready, things might be wild."
bed_wars.3876="Did that say <italic>Escape Sequence<white>?"
bed_wars.3877="Oh boy, well, here goes nothing!"
bed_wars.3878="See you on the outside!"
bed_wars.3879="That's the exit? I was hoping for somewhere to jump in."
bed_wars.3880="Find me the real exit, dummy"
bed_wars.3881="Hey there's a pit I can get behind!"
bed_wars.3882="See ya!"
bed_wars.3883="I gotta go back to the pit man..."
bed_wars.3884="This place is giving me the creeps.."
bed_wars.3885="It smells like... Bed Wars."
bed_wars.3886="I don't like Bed Wars, I only play the pit."
bed_wars.3887="Can you show me the exit?"
bed_wars.3888="Take me to the exit man, I gotta get out of here."
bed_wars.3889="I can't stop playing Bed Wars but I'm not very good at it."
bed_wars.3890="At this point I'm close to giving up, but the game keeps pulling me back."
bed_wars.3891="Maybe I'll look at some YouTubers playing for a while."
bed_wars.3892="Terrible Tony"
bed_wars.3893="Peter"
bed_wars.3894="Explorer John Indigos"
bed_wars.3895="Wally"
bed_wars.3896="You seeing this right?"
bed_wars.3897="I ain't crazy."
bed_wars.3898="There's a wither up there."
bed_wars.3899="It's creepy, it keeps looking at us."
bed_wars.3900="If we don't take it down, the enemy team won't stop respawning."
bed_wars.3901="What am I talking about? That's common knowledge isn't it?"
bed_wars.3902="Anyway, I need your help sending it back where it came from."
bed_wars.3903="We're gonna trap him and use the nether stars to teleport him back to Solace."
bed_wars.3904="There's a team out there that's winning because no one can kill their wither."
bed_wars.3905="It's our responsibility to send it back, really."
bed_wars.3906="Ah there we go, watch this!"
bed_wars.3907="I hope we never see one of those pesky withers again!"
bed_wars.3908="I was taking a quick nap between reforges."
bed_wars.3909="This guy made me reforge his Hyperion like 300 times!"
bed_wars.3910="Made good money tho."
bed_wars.3911="I feel like making a hammer. Do you want one? I don't make hammers often enough."
bed_wars.3912="There conveniently is a forge right next to me."
bed_wars.3913="I can make you one, if you bring me the materials."
