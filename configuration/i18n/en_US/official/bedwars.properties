bed_wars.3926="Can you get me some stuff to practice with?"
bed_wars.3927="I need Silver and Iron, really."
bed_wars.3928="I'm thinking of making 3,000 iron swords and 3,000 silver daggers."
bed_wars.3929="That should skill me up nicely."
bed_wars.3930="Yes! That should get me a few more crafts in."
