main_lobby.354="<dark_green>Jun 11th, 2019\n\n<reset>For years SkyBlock has been one of the most requested games on the Network, today we are releasing our own version of SkyBlock in the Prototype lobby!"
main_lobby.355="<dark_green>Sep 21st, 2012\n\n<reset>Welcome to Hypixel.net, is it currently in Alpha state, so if you guys encounter any bugs, just let me know!"
main_lobby.356="<dark_green>Jan 26th, 2014\n\n<reset>Lots of new features have been released today! First of all, guilds are finally out, so let’s celebrate!"
main_lobby.357="<dark_green>Aug 1st, 2014\n\n<reset>The August Mega Update has Arrived!"
main_lobby.358="<dark_green>Feb 21st, 2015\n\n<reset>Warlords has now entered the full open beta phase! The entire staff have been busy fixing the initial bugs found during the 3 hour Early Access Window."
main_lobby.359="<dark_green>Apr 11th, 2015\n\n<reset>Hypixelians! Prepare yourself for a PvP experience like no other that has ever come to Hypixel!!!"
main_lobby.360="<dark_green>Jun 14th, 2015\n\n<reset>SkyWars is now available for everyone to play on the server! Join via the compass!"
main_lobby.361="<dark_green>Aug 20th, 2015\n\n<reset>Mystery Box is Live! Housing is Live (Beta Mode)! Brand New Pets system! Vanity Shop Revamp!"
main_lobby.362="<dark_green>Jan 5th, 2017\n\n<reset>Great news coming right up! In the next few days we will be introducing the Prototype Lobby (PTL), available to all players."
main_lobby.363="<dark_green>Feb 20th, 2017\n\n<reset>Our latest test game has just been added to the Hypixel Prototype Lobby – introducing Murder Mystery!"
main_lobby.364="<dark_green>Jun 27th, 2017\n\n<reset>It's officially here - Bed Wars has fully released!"
main_lobby.365="<dark_green>Jul 27th, 2018\n\n<reset>Today we are releasing the Guild Update! It is one of the largest updates we've ever made!"
main_lobby.366="<dark_green>Dec 13th, 2018\n\n<reset>Since Sunday, all of us have been counting down the days, minutes, and even seconds until the first Hytale trailer would be released."
main_lobby.367="<dark_green>May 10th, 2021\n\n<reset>Today we're very excited to introduce a brand new feature to the server, Hypixel SMP!"
main_lobby.368="<dark_green>Mar 10th, 2021\n\n<reset>Today, we're beyond excited to announce the release of the official Hypixel SkyBlock Wiki available at"
